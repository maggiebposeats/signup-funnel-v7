  var KPIS=[["Total output","1,284","tasks this month","+18%"],["Quality score","98.2%","across all teams","+2.4%"],["Time saved (AI)","142 hrs","this month","+22%"],["Cost efficiency","+37%","vs. in-house","+5%"]];
  function sampleChart(){
    var W=520,H=180,n=12,gap=10,bw=(W-gap*(n-1))/n,bars='';
    for(var i=0;i<n;i++){ var h1=46+Math.round(Math.abs(Math.sin(i*0.7))*86); var h2=Math.round(h1*(0.42+0.3*Math.abs(Math.cos(i*0.9)))); var x=i*(bw+gap);
      bars+='<rect x="'+x+'" y="'+(H-h1)+'" width="'+bw+'" height="'+h1+'" rx="3" fill="var(--periwinkle)" opacity="0.85"/>';
      bars+='<rect x="'+x+'" y="'+(H-h2)+'" width="'+bw+'" height="'+h2+'" rx="3" fill="var(--teal)"/>';
    }
    return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="none" style="height:180px;display:block">'+bars+'</svg>';
  }
  function dashRecs(){
    var map={exec:"Archive 240 low-priority emails and draft 12 replies for your review",customer:"Resolve 36 tickets without escalation and flag 4 for QA",revenue:"Re-engage 18 stalled deals and book 6 new meetings",talent:"Screen 52 new applicants and shortlist the top 9",finance:"Prepare 12 invoices for approval and reconcile this week"};
    var out=chosenOps().map(function(k){ return '<b>'+escapeHtml(OPS[k].name)+':</b> '+map[k]; });
    if(!out.length) out=["<b>Your AI:</b> connect an operation to see live recommendations"];
    return out;
  }
  function showDashboard(){
    document.getElementById('output').classList.remove('show');
    document.getElementById('funnel').style.display='none';
    document.getElementById('stepFlag').textContent='Workspace preview';
    var name=state.company||'your business';
    document.getElementById('dashTitle').textContent=(state.fname?('Welcome, '+state.fname+' — '):'')+name+'\u2019s workspace is ready to switch on.';
    document.getElementById('dashSub').textContent='These are sample widgets. Unlock to replace them with '+name+'\u2019s live numbers.';
    document.getElementById('kpiRow').innerHTML=KPIS.map(function(k){ return '<div class="kpi locked"><div class="klabel">'+k[0]+'</div><div class="lockable"><div class="kval">'+k[1]+'</div><div class="kdelta">'+k[3]+' \u00b7 '+k[2]+'</div></div><div class="lock-ov"><span class="lk">'+LOCK_SM+'</span></div></div>'; }).join('');
    document.getElementById('chartHolder').innerHTML=sampleChart();
    document.getElementById('activeList').innerHTML=chosenOps().map(function(opk){ var op=OPS[opk]; var n=state.selected[opk].size; return '<div class="active-item"><span class="ai-glyph">'+op.icon+'</span><span class="aim"><span class="ain">'+escapeHtml(op.name)+'</span><span class="aiw">'+n+' '+(n===1?'workflow':'workflows')+' \u00b7 run by HQZen</span></span><span class="status">Provisioned</span></div>'; }).join('')
      + Array.from(state.pods).map(function(k){ var p=PODBYKEY[k]; return '<div class="active-item"><span class="ai-glyph" style="background:'+p.color+'">'+POD_ICON+'</span><span class="aim"><span class="ain">'+escapeHtml(p.name)+'</span><span class="aiw">specialist pod \u00b7 '+p.humans+' Human \u00b7 '+p.agents+' AI</span></span><span class="status">Added</span></div>'; }).join('');
    document.getElementById('recFeed').innerHTML=dashRecs().map(function(r){ return '<div class="recitem"><span class="rd"></span><span class="rt">'+r+'</span></div>'; }).join('');
    document.querySelectorAll('#dashboard .lock-ov').forEach(function(o){ o.onclick=openPaywall; });
    document.getElementById('dashboard').classList.add('show');
    window.scrollTo({top:0,behavior:reduce?'auto':'smooth'});
  }
  document.getElementById('unlockBtn').addEventListener('click',openPaywall);
  document.getElementById('unlockBtn2').addEventListener('click',openPaywall);
  document.getElementById('backToPlan').addEventListener('click',function(){ document.getElementById('dashboard').classList.remove('show'); document.getElementById('funnel').style.display=''; document.getElementById('output').classList.add('show'); document.getElementById('stepFlag').textContent='Your operation'; window.scrollTo({top:0,behavior:reduce?'auto':'smooth'}); });

  // ---- paywall modal ----
  var pwEl=document.getElementById('paywall'), modalEl=pwEl.querySelector('.modal'), MODAL_HTML=modalEl.innerHTML;
  function bindModal(){
    pwEl.querySelector('#pwClose').addEventListener('click',closePaywall);
    pwEl.querySelector('#pwLater').addEventListener('click',closePaywall);
    pwEl.querySelector('#pwGo').addEventListener('click',pwSuccess);
  }
  function openPaywall(){ modalEl.innerHTML=MODAL_HTML; bindModal(); var pp=document.getElementById('pwPkg'); if(pp) pp.textContent=currentPkgName(); pwEl.classList.add('show'); }
  function closePaywall(){ pwEl.classList.remove('show'); }
  function pwSuccess(){
    modalEl.innerHTML='<div class="mlk" style="background:radial-gradient(circle at 32% 28%,var(--teal-soft),var(--teal))">'+CHECK+'</div><h3>You\u2019re all set to build.</h3><p>In the live product this opens secure checkout and provisions your workspace — then your team goes live in days. For now, this is where your journey continues.</p><div class="mcta"><button class="btn btn-primary" id="pwDone" style="width:100%">Done</button></div>';
    modalEl.querySelector('#pwDone').addEventListener('click',closePaywall);
  }
  pwEl.addEventListener('click',function(e){ if(e.target===pwEl) closePaywall(); });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') closePaywall(); });

  document.getElementById('bookBtn');

  function listJoin(arr){ if(arr.length<=1)return arr[0]||''; if(arr.length===2)return arr[0]+' and '+arr[1]; return arr.slice(0,-1).join(', ')+' and '+arr[arr.length-1]; }
  function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function escapeAttr(s){return escapeHtml(s);}

  gotoStep("details");
})();
</script>
</body>

:root{
  --grey-0:#FFFFFF;--grey-5:#FAFAFA;--grey-10:#F4F5F6;--grey-20:#EBEDEF;--grey-30:#DDE1E3;
  --grey-40:#BEC5CA;--grey-50:#A0A9B1;--grey-60:#67747E;--grey-70:#40484F;--grey-80:#2D3439;--grey-90:#0C0D0E;
  --accent:#008FF5;--accent-hover:#0374C7;--accent-container:#EDF7FE;--accent-highlight:#DBEDFD;--accent-border:#6EBEF9;--accent-dark:#083E6A;
  --error:#ED2B42;--error-container:#FAEDEE;--error-highlight:#F6DADD;--error-border:#F28390;--error-hover:#BF2335;
  --success:#06B169;--success-container:#EBFEF6;--success-highlight:#D8FEEE;--success-border:#6FD8AC;--success-hover:#059458;
  --warning:#F5C024;--warning-container:#FDF9ED;--warning-highlight:#FBF4DB;--warning-border:#F8DA80;--warning-dark:#977718;
  --indigo:#3974EA;--indigo-container:#EEF2FC;--indigo-highlight:#DCE5F9;--indigo-border:#8BADF2;
  --violet:#A052F4;--violet-container:#F3ECFD;--violet-highlight:#E7DAFA;--violet-border:#C496F7;
  --orange:#FA7F42;--orange-container:#FCF2EC;--orange-highlight:#FAE5D9;--orange-border:#FAB28E;
  --teal:#23BFCD;--teal-container:#F0FBFC;
  --page:var(--grey-10);--card:var(--grey-0);--float:var(--grey-0);--pane:var(--grey-0);--list:var(--grey-5);
  --fg-primary:var(--grey-90);--fg-secondary:var(--grey-70);--fg-tertiary:var(--grey-60);--fg-quaternary:var(--grey-50);--fg-disabled:var(--grey-40);
  --border:var(--grey-30);--border-hover:var(--grey-40);--hl:var(--grey-10);--container:var(--grey-5);
  --corner:4px;--corner-big:8px;
  --shadow-card:0 1px 2px rgba(12,13,14,.06),0 1px 3px rgba(12,13,14,.05);
  --shadow-modal:0 12px 40px rgba(12,13,14,.25);
  --v2:2px;--v4:4px;--v6:6px;--v8:8px;--v10:10px;--v12:12px;--v14:14px;--v16:16px;--v20:20px;--v24:24px;--v32:32px;
  --t-tiny:10px;--t-sm:12px;--t-semi:13px;--t-reg:14px;--t-md:16px;--d3:18px;--d2:20px;--d1:24px;--d0:30px;
  --pane-w:236px;
}
[data-theme="dark"]{
  --grey-0:#121516;--grey-5:#1C1F21;--grey-10:#262A2D;--grey-20:#313639;--grey-30:#3B4145;
  --grey-40:#5C6164;--grey-50:#7C8083;--grey-60:#9DA0A2;--grey-70:#BEC0C1;--grey-80:#DEDFE0;--grey-90:#FFFFFF;
  --accent-container:#0A233B;--accent-highlight:#083E6A;--error-container:#33090C;--error-highlight:#62121A;
  --success-container:#023B23;--success-highlight:#035935;--warning-container:#382D0B;--warning-highlight:#675211;
  --indigo-container:#0A1635;--indigo-highlight:#162E62;--violet-container:#1B0537;--violet-highlight:#3C1866;
  --orange-container:#371706;--orange-highlight:#683115;
  --page:#121516;--card:var(--grey-5);--float:var(--grey-10);--pane:var(--grey-5);--list:var(--grey-10);
  --shadow-card:0 1px 2px rgba(0,0,0,.4);--shadow-modal:0 12px 40px rgba(0,0,0,.6);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--page);color:var(--fg-primary);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums}
svg.ic{width:1.25em;height:1.25em;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
.c-sec{color:var(--fg-secondary)}.c-ter{color:var(--fg-tertiary)}.c-qua{color:var(--fg-quaternary)}.c-success{color:var(--success)}.c-accent{color:var(--accent)}
.bold{font-weight:600}.t-sm{font-size:var(--t-sm)}.t-tiny{font-size:var(--t-tiny)}.t-semi{font-size:var(--t-semi)}

.iconbox{width:28px;height:28px;border-radius:var(--corner);display:flex;align-items:center;justify-content:center;background:var(--hl);color:var(--fg-secondary);flex:none}
.iconbox.blue{background:var(--accent-container);color:var(--accent)}.iconbox.green{background:var(--success-container);color:var(--success)}
.iconbox.red{background:var(--error-container);color:var(--error)}.iconbox.violet{background:var(--violet-container);color:var(--violet)}.iconbox.orange{background:var(--orange-container);color:var(--orange)}
.status{display:inline-flex;align-items:center;gap:3px;font-size:var(--t-tiny);font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:var(--hl);color:var(--fg-secondary)}
.status.blue{background:var(--accent-highlight);color:var(--accent-hover)}.status.green{background:var(--success-highlight);color:var(--success-hover)}
.status.red{background:var(--error-highlight);color:var(--error-hover)}.status.violet{background:var(--violet-highlight);color:var(--violet)}.status.orange{background:var(--orange-highlight);color:var(--orange)}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex:none;background:var(--violet-highlight);color:var(--violet);width:32px;height:32px;font-size:var(--t-sm)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--border);background:var(--card);color:var(--fg-secondary);border-radius:var(--corner);padding:9px 16px;font-size:var(--t-semi);font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--hl);border-color:var(--border-hover)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn.primary:hover{background:var(--accent-hover)}
.btn.white{background:#fff;border-color:#fff;color:var(--accent-dark)}.btn.white:hover{background:rgba(255,255,255,.9)}
.btn.ghost{border-color:transparent;background:transparent}.btn.sm{padding:6px 12px;font-size:var(--t-sm)}.btn.lg{padding:12px 22px;font-size:var(--t-reg)}

/* shell */
.app{display:grid;grid-template-columns:var(--pane-w) 1fr;min-height:100vh}
.pane{background:var(--pane);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:var(--v16) var(--v8);gap:var(--v2);position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:var(--v10);padding:var(--v8) var(--v10) var(--v16)}
.brand .mark{width:30px;height:30px;border-radius:var(--corner-big);background:linear-gradient(135deg,var(--accent),var(--accent-hover));display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
.brand b{font-size:var(--d3);letter-spacing:-.01em}
.org{display:flex;align-items:center;gap:var(--v8);margin:0 var(--v8) var(--v12);padding:var(--v8);border:1px solid var(--border);border-radius:var(--corner)}
.org .o-name{font-weight:600;font-size:var(--t-semi)}.org .o-plan{font-size:11px;color:var(--fg-tertiary)}
.sec{font-size:var(--t-tiny);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-quaternary);padding:var(--v12) var(--v10) var(--v4);font-weight:600}
.nav{display:flex;align-items:center;gap:var(--v12);padding:var(--v8) var(--v10);border-radius:var(--corner);color:var(--fg-secondary);cursor:pointer;font-size:var(--t-semi)}
.nav:hover{background:var(--hl)}.nav.active{background:var(--accent-container);color:var(--accent);font-weight:600}
.nav.locked{opacity:.55}.nav .lock{margin-left:auto;color:var(--fg-quaternary)}
.pane-foot{margin-top:auto;display:flex;align-items:center;gap:var(--v10);padding:var(--v10);border-top:1px solid var(--border)}

.main{display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;gap:var(--v16);padding:var(--v12) var(--v24);background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
.crumbs{display:flex;align-items:center;gap:var(--v8);font-size:var(--t-semi);color:var(--fg-tertiary)}.crumbs b{color:var(--fg-primary)}
.search{margin-left:auto;width:280px;display:flex;align-items:center;gap:var(--v8);background:var(--list);border:1px solid var(--border);border-radius:var(--corner);padding:var(--v8) var(--v12);color:var(--fg-tertiary);cursor:pointer}
.iconbtn{width:36px;height:36px;border-radius:var(--corner);border:0;background:transparent;color:var(--fg-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer}
.iconbtn:hover{background:var(--hl)}
.content{padding:var(--v24);max-width:1180px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:var(--v20)}

/* hero (the banner you liked) */
.hero{position:relative;overflow:hidden;border-radius:12px;padding:var(--v24) var(--v32);color:#fff;background:linear-gradient(120deg,var(--accent),var(--violet));display:flex;align-items:center;gap:var(--v24)}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.12)}
.hero .h-main{flex:1;position:relative;z-index:1}
.hero .h-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:var(--t-tiny);font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.18);padding:3px 9px;border-radius:20px}
.hero h1{font-size:var(--d1);font-weight:600;margin-top:var(--v10)}
.hero p{font-size:var(--t-semi);opacity:.92;margin-top:4px;max-width:560px}
.hero .h-stats{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:var(--v12)}
.hero .h-stat{font-size:var(--t-semi);opacity:.9;display:flex;align-items:baseline;gap:4px}
.hero .h-stat b{font-size:var(--d3);font-weight:800;opacity:1;line-height:1}
.hero .h-op-list{font-size:var(--t-tiny);font-weight:600;letter-spacing:.03em;opacity:.72;margin-top:6px;text-transform:uppercase}
.hero .h-sub-note{font-size:var(--t-semi);opacity:.78;margin-top:8px;max-width:480px}
.hero .h-cta{position:relative;z-index:1;display:flex;flex-direction:column;gap:var(--v8);align-items:flex-end}
.hero .h-note{font-size:var(--t-sm);opacity:.85}

/* building state: the command center assembles as a widget on the overview, then morphs into the success banner */
.hero-building .h-cta{align-items:flex-end;justify-content:center}
.hero-spin{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.55);border-top-color:#fff;display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.build-bar{height:6px;border-radius:6px;background:rgba(255,255,255,.25);overflow:hidden;margin-top:var(--v14);max-width:560px}
.build-bar i{display:block;height:100%;width:0;background:#fff;border-radius:6px;transition:width .45s ease}
.build-steps{display:flex;flex-direction:column;gap:8px;margin-top:var(--v14)}
.bstep{display:flex;align-items:center;gap:10px;font-size:var(--t-semi);color:rgba(255,255,255,.7);transition:color .25s}
.bstep .bdot{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(255,255,255,.5);flex:none;display:flex;align-items:center;justify-content:center}
.bstep.on{color:#fff}
.bstep.on .bdot{border-color:#fff}
.bstep.on .bdot::after{content:"";width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1s ease-in-out infinite}
.bstep.done{color:#fff}
.bstep.done .bdot{background:#fff;border-color:#fff}
.bstep.done .bdot::after{content:"\2713";font-size:11px;font-weight:700;color:var(--accent-hover)}
.build-pct{font-size:var(--d0);font-weight:700;line-height:1}
.hero-reveal{animation:heroReveal .5s ease both}
@keyframes heroReveal{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.hero-spin,.bstep.on .bdot::after{animation:none}.hero-reveal{animation:none}}

/* stat band */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--v12)}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--corner-big);box-shadow:var(--shadow-card);padding:var(--v16);display:flex;gap:var(--v12);align-items:center;border-left:3px solid var(--accent)}
.stat.green{border-left-color:var(--success)}.stat.violet{border-left-color:var(--violet)}.stat.orange{border-left-color:var(--orange)}
.stat .s-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none;background:var(--accent-container);color:var(--accent)}
.stat.green .s-ic{background:var(--success-container);color:var(--success)}.stat.violet .s-ic{background:var(--violet-container);color:var(--violet)}.stat.orange .s-ic{background:var(--orange-container);color:var(--orange)}
.stat .s-val{font-size:var(--d2);font-weight:600;line-height:1.1}.stat .s-lab{font-size:var(--t-sm);color:var(--fg-tertiary)}

/* cards */
.real-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:var(--v16);align-items:start}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--corner-big);box-shadow:var(--shadow-card);overflow:hidden;min-width:0}
.card-h{display:flex;align-items:center;gap:var(--v10);padding:var(--v14) var(--v16);border-bottom:1px solid var(--border);flex-wrap:wrap}
.card-h h3{font-size:var(--t-md);font-weight:600}.card-h .sp{flex:1}
.card-b{padding:var(--v16)}
.row{display:flex;align-items:center;gap:var(--v10);padding:var(--v10) var(--v16);border-top:1px solid var(--border)}
.row:first-child{border-top:0}.row .r-main{flex:1;min-width:0}.row .r-name{font-size:var(--t-semi);font-weight:600}.row .r-sub{font-size:var(--t-sm);color:var(--fg-tertiary)}
.kan{display:flex;gap:var(--v8)}.kan .kc{flex:1;border:1px solid var(--border);border-radius:var(--corner);padding:var(--v10)}
.kan .kc .h{font-size:var(--t-sm);color:var(--fg-tertiary);font-weight:600}.kan .kc .n{font-size:var(--d3);font-weight:600;margin-top:4px}.kan .kc .z{font-size:var(--t-sm);color:var(--fg-quaternary)}

/* preview (blurred) */
.preview-head{display:flex;align-items:center;gap:var(--v10)}
.preview-head h2{font-size:var(--t-md);font-weight:600}
.preview-tag{display:inline-flex;align-items:center;gap:4px;font-size:var(--t-tiny);font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-tertiary);background:var(--hl);padding:3px 8px;border-radius:20px}
.preview-head .sp{flex:1}
.preview-wrap{position:relative;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--card)}
.preview-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:var(--v16);padding:var(--v16);filter:blur(4px);pointer-events:none;user-select:none;max-height:760px;overflow:hidden}
.pcol{display:flex;flex-direction:column;gap:var(--v16);min-width:0}
.preview-veil{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:var(--v24);background:linear-gradient(180deg,color-mix(in srgb,var(--page) 25%,transparent),color-mix(in srgb,var(--page) 78%,transparent))}
.unlock-card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-modal);max-width:460px;width:100%;text-align:center;padding:var(--v24)}
.unlock-card .u-eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#0d8a72;background:rgba(45,212,191,.16);border:1px solid rgba(45,212,191,.32);padding:5px 11px;border-radius:999px;margin-bottom:var(--v12)}
.unlock-card .u-eyebrow .u-free-dot{width:7px;height:7px;border-radius:50%;background:var(--success);box-shadow:0 0 8px rgba(45,212,191,.7)}
.unlock-card .u-ic{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto var(--v12)}
.unlock-card h3{font-size:var(--d2);font-weight:600}.unlock-card p{font-size:var(--t-semi);color:var(--fg-tertiary);margin-top:6px;margin-bottom:var(--v16)}
.unlock-card p b{color:var(--fg-primary);font-weight:700}
.unlock-feats{display:flex;justify-content:center;gap:var(--v16);flex-wrap:wrap;margin-bottom:var(--v16)}
.unlock-feats span{display:inline-flex;align-items:center;gap:5px;font-size:var(--t-sm);color:var(--fg-secondary);font-weight:600}
.unlock-card .u-actions{display:flex;flex-direction:column;gap:var(--v8)}

/* Gmail Inbox → Cards (the visible Free Tier wow moment) */
.gmail-inbox{padding:var(--v16) var(--v16) var(--v16)}
.gmail-inbox .live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--success);margin-right:6px;box-shadow:0 0 8px rgba(45,212,191,.7);animation:gi-pulse 2s ease-in-out infinite}
@keyframes gi-pulse{50%{opacity:.4}}
.gi-intro{display:flex;gap:var(--v16);align-items:center;justify-content:space-between;padding:var(--v12) var(--v16);margin:0 calc(var(--v16)*-1) var(--v16);background:linear-gradient(135deg,rgba(45,212,191,.06),rgba(124,138,255,.04));border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-wrap:wrap}
.gi-intro p{font-size:var(--t-sm);color:var(--fg-secondary);line-height:1.55;max-width:64ch;margin:0}
.gi-intro p b{color:var(--fg-primary);font-weight:700}
.gi-intro .btn{flex:none;white-space:nowrap}
.gi-board{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--v12)}
@media (max-width:920px){.gi-board{grid-template-columns:1fr}}
.gi-col{background:var(--hl);border:1px solid var(--border);border-radius:var(--corner);padding:var(--v10);display:flex;flex-direction:column;gap:var(--v8);min-width:0}
.gi-coltop{display:flex;align-items:center;gap:7px;font-size:var(--t-semi);font-weight:700;color:var(--fg-primary)}
.gi-coltop b{flex:1}
.gi-coltop .gi-dot{width:8px;height:8px;border-radius:50%;flex:none}
.gi-count{font-size:11px;font-weight:800;color:var(--fg-tertiary);background:var(--card);border:1px solid var(--border);padding:2px 8px;border-radius:999px}
.gi-coltxt{font-size:var(--t-tiny);color:var(--fg-tertiary);margin-top:-4px;margin-bottom:4px;letter-spacing:.01em}
.gi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--corner);padding:var(--v10);display:flex;flex-direction:column;gap:6px;transition:transform .12s ease,border-color .15s ease;cursor:default}
.gi-card:hover{transform:translateY(-1px);border-color:var(--accent)}
.gi-cardtop{display:flex;align-items:center;gap:7px;min-width:0}
.gi-av{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:11px;color:#fff;flex:none}
.gi-from{flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.2}
.gi-from b{font-size:11.5px;font-weight:700;color:var(--fg-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gi-from span{font-size:10.5px;color:var(--fg-quaternary)}
.gi-tag{font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:999px;white-space:nowrap;flex:none}
.gi-tag.red{background:rgba(255,128,149,.16);color:#c44561;border:1px solid rgba(255,128,149,.28)}
.gi-tag.orange{background:rgba(255,159,64,.16);color:#b76012;border:1px solid rgba(255,159,64,.28)}
.gi-tag.blue{background:rgba(124,138,255,.14);color:#5562cc;border:1px solid rgba(124,138,255,.28)}
.gi-tag.violet{background:rgba(167,139,250,.16);color:#6f4ed4;border:1px solid rgba(167,139,250,.28)}
.gi-tag.teal{background:rgba(45,212,191,.16);color:#0d8a72;border:1px solid rgba(45,212,191,.32)}
.gi-tag.indigo{background:rgba(99,91,255,.14);color:#3b3393;border:1px solid rgba(99,91,255,.26)}
.gi-subj{font-size:var(--t-semi);font-weight:600;color:var(--fg-primary);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gi-snip{font-size:var(--t-sm);color:var(--fg-tertiary);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gi-ai{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--accent);font-weight:600;padding-top:5px;border-top:1px dashed var(--border);margin-top:2px}
.gi-ai span{color:var(--fg-tertiary);font-weight:500}
.gi-foot{display:flex;align-items:center;gap:var(--v16);padding:var(--v12) var(--v16) var(--v8);margin:var(--v16) calc(var(--v16)*-1) calc(var(--v16)*-1);border-top:1px solid var(--border);flex-wrap:wrap;background:rgba(0,0,0,.015)}
.gi-stat{display:flex;align-items:baseline;gap:6px}
.gi-stat b{font-family:var(--display);font-weight:800;font-size:var(--t-md);color:var(--fg-primary)}
.gi-stat span{font-size:var(--t-sm);color:var(--fg-tertiary)}

/* sample-data overlay (clearly labeled demo) */
.sample-overlay{position:fixed;inset:0;z-index:40;background:var(--page);display:none;flex-direction:column;overflow:auto}
.sample-overlay.open{display:flex}
.sample-top{position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:var(--v12);padding:var(--v12) var(--v24);background:var(--warning-container);border-bottom:1px solid var(--warning-border);color:var(--warning-dark);font-size:var(--t-semi);font-weight:600}
.sample-top .sample-tag{font-size:var(--t-tiny);font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:var(--warning);color:#3a2e07;padding:3px 8px;border-radius:20px}
.sample-content{padding:var(--v24);max-width:1180px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:var(--v16);cursor:pointer}

/* recruitment widget */
.rec-pos{display:flex;gap:var(--v8);padding:var(--v12) var(--v16);border-bottom:1px solid var(--border);flex-wrap:wrap;overflow:hidden}
.rec-pos .rp{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:var(--t-sm);font-weight:600;color:var(--fg-secondary);cursor:pointer}
.rec-pos .rp:hover{border-color:var(--accent-border);color:var(--accent)}
.rec-pos .rp .n{font-size:var(--t-tiny);font-weight:700;background:var(--accent-highlight);color:var(--accent-hover);border-radius:10px;padding:1px 6px}
.rec-pos .rp-label{font-size:var(--t-tiny);text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:var(--fg-quaternary);align-self:center;margin-right:var(--v4)}
.rec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--v12);padding:var(--v16)}
@media (max-width:1380px){.rec-grid{grid-template-columns:repeat(2,1fr)}}@media (max-width:820px){.rec-grid{grid-template-columns:1fr}}
.rec-card{border:1px solid var(--border);border-radius:var(--corner-big);padding:var(--v16);display:flex;flex-direction:column;gap:var(--v12);transition:border-color .15s ease,box-shadow .15s ease}
.rec-card:hover{border-color:var(--accent-border);box-shadow:0 4px 16px -8px rgba(12,13,14,.18)}
.rec-card .rc-top{display:flex;gap:var(--v10);align-items:center}
.rec-card .rc-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--t-md);flex:none;overflow:hidden}
.rec-card .rc-av img{width:100%;height:100%;object-fit:cover;display:block}

/* AI Agent Roster */
.ai-roster-card .ai-agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--v12);padding:var(--v14) var(--v16);}
.ai-agent-card{display:flex;align-items:center;gap:var(--v12);padding:var(--v12) var(--v14);border:1px solid var(--border);border-radius:var(--corner-big);background:var(--list);transition:border-color .15s,box-shadow .15s;}
.ai-agent-card:hover{border-color:var(--accent-border);box-shadow:0 2px 8px -4px rgba(15,23,42,.1);}
.ai-agent-av{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:none;}
.ai-agent-av.indigo{background:var(--indigo-container);color:var(--indigo);}
.ai-agent-av.blue{background:var(--accent-container);color:var(--accent);}
.ai-agent-av.teal{background:rgba(45,212,191,.15);color:var(--teal,#0d9488);}
.ai-agent-av.green{background:rgba(34,197,94,.12);color:#16a34a;}
.ai-agent-av.violet{background:rgba(124,58,237,.12);color:#7c3aed;}
.ai-agent-av .ic{width:18px;height:18px;}
.ai-agent-tx{flex:1;min-width:0;}
.ai-agent-name{font-weight:700;font-size:var(--t-semi);color:var(--fg-primary);}
.ai-agent-role{font-size:var(--t-sm);color:var(--fg-tertiary);margin-top:2px;}
.ai-agent-status{display:flex;align-items:center;gap:5px;font-size:var(--t-tiny);font-weight:700;color:var(--success-hover);white-space:nowrap;}

/* Today's Priorities */
.priorities-card .priority-list{display:flex;flex-direction:column;padding:4px 0;}
.priority-row{display:flex;align-items:center;gap:var(--v12);padding:var(--v12) var(--v16);border-top:1px solid var(--border);}
.priority-row:first-child{border-top:0;}
.priority-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none;}
.priority-ic.blue{background:var(--accent-container);color:var(--accent);}
.priority-ic.amber{background:rgba(251,191,36,.15);color:#b45309;}
.priority-ic.indigo{background:var(--indigo-container);color:var(--indigo);}
.priority-ic.green{background:rgba(34,197,94,.12);color:#16a34a;}
.priority-ic.teal{background:rgba(45,212,191,.15);color:var(--teal,#0d9488);}
.priority-ic .ic{width:16px;height:16px;}
.priority-tx{flex:1;min-width:0;font-size:var(--t-semi);color:var(--fg-secondary);line-height:1.45;}
.rec-card .rc-id{min-width:0;flex:1}
.rec-card .rc-name{font-size:var(--t-reg);font-weight:700;line-height:1.2}
.rec-card .rc-role{font-size:var(--t-sm);color:var(--fg-secondary);margin-top:1px}
.rec-card .rc-meta{display:flex;align-items:center;gap:4px;font-size:var(--t-tiny);color:var(--fg-tertiary);margin-top:3px}
.rec-card .rc-match{display:inline-flex;align-items:center;gap:4px;flex:none;border-radius:20px;padding:5px 10px;font-size:var(--t-sm);font-weight:700;line-height:1}
.rec-card .rc-match .ic{width:13px;height:13px}
.rec-card .rc-match.great{background:var(--success-highlight);color:var(--success-hover)}
.rec-card .rc-match.good{background:var(--accent-highlight);color:var(--accent-hover)}
.rec-card .rc-match.ok{background:var(--hl);color:var(--fg-secondary)}
.rec-card .rc-inds{display:flex;flex-wrap:wrap;gap:5px}
.rec-card .rc-ind{font-size:var(--t-tiny);font-weight:600;background:var(--hl);color:var(--fg-tertiary);border-radius:var(--corner);padding:3px 8px}
.rec-card .rc-match-note{display:flex;align-items:flex-start;gap:6px;font-size:var(--t-tiny);color:var(--fg-tertiary);line-height:1.4}
.rec-card .rc-match-note .ic{width:12px;height:12px;flex:none;margin-top:1px;color:var(--accent)}
.rec-card .rc-match-note b{color:var(--fg-secondary);font-weight:700}
.rec-card .rc-cost{border-top:1px solid var(--border);padding-top:var(--v12)}
.rec-card .rc-cost-main{display:flex;align-items:baseline;gap:5px}
.rec-card .rc-cost-total{font-size:var(--d3);font-weight:800;color:var(--fg-primary);letter-spacing:-.01em}
.rec-card .rc-cost-per{font-size:var(--t-sm);color:var(--fg-tertiary);font-weight:600}
.rec-card .rc-cost-break{font-size:var(--t-tiny);color:var(--fg-tertiary);margin-top:3px}
.rec-card .rc-cost-break .rc-plus{color:var(--fg-quaternary);font-weight:700;margin:0 2px}
.rec-card .rc-acts{display:flex;gap:var(--v8);margin-top:auto}
.rec-card .rc-acts .btn{flex:1;justify-content:center}
.rec-foot{display:flex;align-items:center;gap:var(--v8);padding:var(--v10) var(--v16);border-top:1px solid var(--border);font-size:var(--t-sm);color:var(--fg-tertiary)}
.rec-foot .see-all{margin-left:auto;color:var(--accent);font-weight:600;cursor:pointer}
.rec-foot .see-all:hover{text-decoration:underline}

/* small widget bits used inside blurred grid */
.bars{display:flex;flex-direction:column;gap:var(--v10);padding:var(--v8) 0}
.bar-row{display:flex;align-items:center;gap:var(--v10);padding:0 var(--v16)}
.bar-row .bl{width:90px;font-size:var(--t-sm);font-weight:600;flex:none}
.bar{flex:1;height:8px;border-radius:8px;background:var(--hl);overflow:hidden}.bar i{display:block;height:100%;border-radius:8px}
.dist{display:flex;height:10px;border-radius:6px;overflow:hidden;margin:var(--v12) var(--v16)}
.tbl-row{display:grid;grid-template-columns:1.4fr .7fr .7fr 1fr;gap:var(--v8);align-items:center;padding:var(--v10) var(--v16);border-top:1px solid var(--border);font-size:var(--t-sm)}
.shot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--v8);padding:var(--v16)}
.shot{aspect-ratio:4/3;border-radius:var(--corner);background:linear-gradient(135deg,var(--grey-20),var(--grey-30));position:relative}
.lb-row{display:flex;align-items:center;gap:var(--v10);padding:var(--v8) var(--v16);border-top:1px solid var(--border)}.lb-row:first-child{border-top:0}
.lb-rank{width:18px;font-weight:700;color:var(--fg-tertiary);text-align:center}.lb-h{margin-left:auto;font-weight:600}

/* modal */
.modal-scrim{position:fixed;inset:0;background:rgba(12,13,14,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:var(--v20)}
.modal-scrim.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-modal);max-width:440px;width:100%;overflow:hidden;position:relative}
.modal .m-hero{padding:var(--v24) var(--v24) var(--v16);text-align:center;background:linear-gradient(160deg,var(--accent-container),var(--card))}
.modal .m-ic{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto var(--v12)}
.modal h2{font-size:var(--d2);font-weight:600}.modal .m-sub{font-size:var(--t-semi);color:var(--fg-tertiary);margin-top:4px}
.modal .m-body{padding:var(--v16) var(--v24) var(--v24)}
.modal .m-feat{display:flex;align-items:flex-start;gap:var(--v10);padding:var(--v8) 0}
.modal .m-feat .fi{color:var(--success);flex:none;margin-top:1px}.modal .m-feat .ft{font-size:var(--t-semi);font-weight:600}.modal .m-feat .fd{font-size:var(--t-sm);color:var(--fg-tertiary)}
.modal .m-actions{display:flex;flex-direction:column;gap:var(--v8);margin-top:var(--v16)}
.modal .m-close{position:absolute;top:var(--v16);right:var(--v16);cursor:pointer;color:var(--fg-tertiary)}

@media (max-width:1080px){.stats{grid-template-columns:repeat(2,1fr)}.real-grid,.preview-grid{grid-template-columns:1fr}.shot-grid{grid-template-columns:repeat(3,1fr)}.hero{flex-direction:column;align-items:flex-start;gap:var(--v16)}.hero .h-cta{align-items:flex-start}}
@media (max-width:820px){.app{grid-template-columns:1fr}.pane{display:none}}

/* personalized overview extras */
.iconbox.indigo{background:var(--indigo-container);color:var(--indigo)}
.status.indigo{background:var(--indigo-highlight);color:var(--indigo)}
.iconbox.teal{background:var(--teal-container);color:var(--teal)}
.status.teal{background:var(--teal-container);color:var(--teal)}
.tool-tiles{display:flex;flex-wrap:wrap;gap:var(--v8)}
.tool-tile{display:inline-flex;align-items:center;gap:var(--v8);border:1px solid var(--border);border-radius:var(--corner);padding:5px 10px 5px 5px;font-size:var(--t-sm);font-weight:600;color:var(--fg-secondary)}
.tt-logo{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--border);overflow:hidden;flex:none}
.tt-logo svg{width:100%;height:100%;display:block}
.tt-mono{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:var(--t-tiny)}
.empty-mini{font-size:var(--t-sm);color:var(--fg-tertiary);padding:var(--v8) 0}


/* ===== merged-in setup flow ===== */
.btn:disabled{opacity:.5;cursor:default}
#setupFlow{position:relative;z-index:1}
/* ===== top bar ===== */
.top{height:56px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;gap:var(--v10);padding:0 var(--v20);position:sticky;top:0;z-index:5}
.su-brand{display:flex;align-items:center;gap:var(--v8);font-weight:700;font-size:var(--t-md)}
.su-brand .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--violet));display:flex;align-items:center;justify-content:center;color:#fff}
.su-brand .logo svg{width:16px;height:16px}
.top .sp{flex:1}
.top .who{font-size:var(--t-sm);color:var(--fg-tertiary)}

.wrap{max-width:1080px;margin:0 auto;padding:var(--v32) var(--v20) 96px}

/* ===== welcome ===== */
#welcome{position:relative;overflow:hidden;min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:var(--v24)}
#welcome::before{content:"";position:absolute;inset:-10%;z-index:0;pointer-events:none;background:radial-gradient(46% 42% at 16% 20%,rgba(0,143,245,.20),transparent 62%),radial-gradient(44% 40% at 84% 22%,rgba(160,82,244,.18),transparent 62%),radial-gradient(50% 46% at 74% 92%,rgba(35,191,205,.16),transparent 62%),radial-gradient(40% 38% at 28% 88%,rgba(0,143,245,.12),transparent 64%);animation:orbDrift 18s ease-in-out infinite alternate}
#welcome::after{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(var(--border) 1px,transparent 1px);background-size:24px 24px;opacity:.55;-webkit-mask-image:radial-gradient(circle at 50% 44%,#000 26%,transparent 72%);mask-image:radial-gradient(circle at 50% 44%,#000 26%,transparent 72%)}
@keyframes orbDrift{from{transform:translate3d(0,0,0) scale(1)}to{transform:translate3d(0,-18px,0) scale(1.05)}}
.welcome-card{position:relative;z-index:1;max-width:560px;text-align:center}
.welcome-mark{position:relative;width:72px;height:72px;border-radius:20px;margin:0 auto var(--v20);background:linear-gradient(135deg,var(--accent),var(--violet));display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 16px 40px rgba(124,138,255,.35),var(--shadow-modal)}
.welcome-mark::before{content:"";position:absolute;inset:-13px;border-radius:30px;border:1px solid var(--accent-border);opacity:.6}
.welcome-mark::after{content:"";position:absolute;inset:-26px;border-radius:38px;border:1px solid var(--border);opacity:.45}
.welcome-mark svg{width:36px;height:36px}
.welcome-eyebrow{font-size:var(--t-tiny);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
#welcome h1{font-size:34px;font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-top:var(--v10)}
#welcome p{font-size:var(--t-md);color:var(--fg-tertiary);margin:var(--v12) auto 0;max-width:42ch;line-height:1.55}
.welcome-cta{margin-top:var(--v24);display:flex;flex-direction:column;align-items:center;gap:var(--v10)}
.welcome-steps{display:flex;gap:var(--v8);justify-content:center;flex-wrap:wrap;margin-top:var(--v32)}
.wpill{display:inline-flex;align-items:center;gap:6px;font-size:var(--t-sm);font-weight:600;color:var(--fg-tertiary);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px}
.wpill .n{width:18px;height:18px;border-radius:50%;background:var(--accent-container);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* ===== wizard ===== */
#wizard{display:none}
.stepper{display:flex;align-items:center;gap:var(--v6);margin-bottom:var(--v24);flex-wrap:wrap}
.stp{display:inline-flex;align-items:center;gap:var(--v8);background:transparent;border:0;cursor:pointer;color:var(--fg-quaternary);font:inherit;font-size:var(--t-sm);font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:var(--v4) 2px}
.stp:disabled{cursor:default}
.stp .num{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:var(--t-sm)}
.stp.active{color:var(--fg-primary)}.stp.active .num{border-color:var(--accent);background:var(--accent);color:#fff}
.stp.done{color:var(--fg-secondary)}.stp.done .num{border-color:var(--success);background:var(--success);color:#fff}
.stp.done .num span{display:none}.stp.done .num::after{content:"\2713"}
.stp-div{flex:1;min-width:16px;height:1px;background:var(--border)}

.step{display:none}.step.show{display:block}
.step-head h2{font-size:var(--d1);font-weight:700;letter-spacing:-.01em}
.step-head p{font-size:var(--t-md);color:var(--fg-tertiary);margin-top:6px;max-width:64ch;line-height:1.55}

.airec{display:flex;align-items:flex-start;gap:var(--v10);padding:var(--v12) var(--v16);border-radius:var(--corner-big);background:var(--accent-container);border:1px solid var(--accent-border);margin:var(--v20) 0}
.airec:empty{display:none}
.airec .spark{width:30px;height:30px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;background:linear-gradient(135deg,var(--accent),var(--violet))}
.airec .spark svg{width:16px;height:16px}
.airec .arx{flex:1;min-width:0}
.airec .arl{font-size:var(--t-tiny);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-hover)}
.airec .art{font-size:var(--t-reg);color:var(--fg-secondary);margin-top:2px;line-height:1.5}
.airec .art b{color:var(--fg-primary);font-weight:600}
.airec .arbtn{margin-top:var(--v10)}

/* goals */
.goals{display:grid;grid-template-columns:1fr 1fr;gap:var(--v12)}
.goal{display:flex;gap:var(--v12);align-items:flex-start;text-align:left;padding:var(--v16);border-radius:var(--corner-big);background:var(--card);border:1px solid var(--border);cursor:pointer;color:var(--fg-primary);font:inherit;transition:border-color .15s,background .15s}
.goal:hover{border-color:var(--border-hover)}
.goal:focus-visible{outline:none;box-shadow:0 0 0 2px var(--card),0 0 0 4px var(--accent)}
.goal[aria-pressed=true]{border-color:var(--accent-border);background:var(--accent-container)}
.goal .gg{width:40px;height:40px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;color:var(--accent);background:var(--accent-container)}
.goal .gg svg{width:21px;height:21px}
.goal[aria-pressed=true] .gg{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-hover))}
.goal .gn{font-weight:600;font-size:var(--t-md);display:flex;align-items:center;justify-content:space-between;gap:var(--v8)}
.goal .gd{font-size:var(--t-semi);color:var(--fg-tertiary);margin-top:4px;line-height:1.45}
.goal .gbox{width:20px;height:20px;border-radius:var(--corner);border:1.5px solid var(--border);flex:none;display:flex;align-items:center;justify-content:center}
.goal[aria-pressed=true] .gbox{border-color:var(--accent);background:var(--accent)}
.goal[aria-pressed=true] .gbox::after{content:"";width:7px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.gx{flex:1;min-width:0}

/* packages (pods) */
.pods{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--v16)}
.pod{position:relative;display:flex;flex-direction:column;border:1px solid var(--border);border-radius:12px;background:var(--card);overflow:hidden;transition:border-color .15s,box-shadow .15s}
.pod:hover{border-color:var(--border-hover);box-shadow:var(--shadow-card)}
.pod.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.pod-top{height:84px;display:flex;align-items:flex-end;justify-content:space-between;padding:var(--v12);position:relative;color:#fff}
.pod-cat{font-size:var(--t-tiny);font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(0,0,0,.28);padding:4px 9px;border-radius:20px;align-self:flex-start}
.pod-emblem{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;color:#fff}
.pod-emblem svg{width:20px;height:20px}
.pod-pop{position:absolute;top:0;right:0;background:var(--violet);color:#fff;font-size:var(--t-tiny);font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 12px;border-bottom-left-radius:10px}
.pod-body{padding:var(--v16);display:flex;flex-direction:column;flex:1}
.pod-name-row{display:flex;align-items:baseline;justify-content:space-between;gap:var(--v8)}
.pod-name{font-size:var(--t-md);font-weight:700}
.pod-price{font-size:var(--t-md);font-weight:700;white-space:nowrap}
.pod-price span{font-size:var(--t-sm);font-weight:500;color:var(--fg-tertiary)}
.pod-tag{font-weight:600;font-size:var(--t-reg);margin-top:var(--v8)}
.pod-desc{font-size:var(--t-semi);color:var(--fg-tertiary);margin-top:6px;line-height:1.5;flex:1}
.pod-stats{display:flex;gap:var(--v6);margin-top:var(--v14);background:var(--list);border:1px solid var(--border);border-radius:var(--corner-big);padding:var(--v10)}
.pod-stat{flex:1;text-align:center}
.pod-stat .v{font-weight:700;font-size:var(--t-md);color:var(--accent)}
.pod-stat .l{font-size:var(--t-tiny);color:var(--fg-tertiary);margin-top:2px;line-height:1.3}
.pod-team{display:flex;gap:var(--v8);margin-top:var(--v12)}
.pod-chip{flex:1;display:inline-flex;align-items:center;gap:6px;font-size:var(--t-sm);font-weight:600;border:1px solid var(--border);border-radius:20px;padding:6px 10px;color:var(--fg-secondary)}
.pod-chip svg{width:14px;height:14px;color:var(--fg-tertiary)}
.pod-chip.h{background:var(--success-container);border-color:var(--success-border);color:var(--success-hover)}
.pod-chip.a{background:var(--accent-container);border-color:var(--accent-border);color:var(--accent-hover)}
.pod-rate{display:flex;align-items:center;gap:6px;margin-top:var(--v12);font-size:var(--t-semi);color:var(--fg-tertiary)}
.pod-rate .stars{color:var(--warning)}
.pod-rate b{color:var(--fg-primary)}
.pod-btn{margin-top:var(--v14)}
.pod-btn .btn{width:100%}
.aipick{display:inline-flex;align-items:center;gap:4px;font-size:var(--t-tiny);font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--violet);background:var(--violet-container);border:1px solid var(--violet-border);border-radius:20px;padding:3px 9px}
.aipick svg{width:11px;height:11px}

/* team */
.roles{display:flex;flex-direction:column;gap:var(--v12)}
.role{border:1px solid var(--border);border-radius:var(--corner-big);background:var(--card);padding:var(--v16)}
.role-top{display:flex;align-items:flex-start;gap:var(--v12)}
.role .rg{width:40px;height:40px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center}
.role .rg svg{width:21px;height:21px}
.role .rx{flex:1;min-width:0}
.role .rn{font-weight:600;font-size:var(--t-md)}
.role .rd{font-size:var(--t-semi);color:var(--fg-tertiary);margin-top:2px;line-height:1.45}
.role .rsrc{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:var(--t-tiny);font-weight:600;color:var(--violet);border:1px solid var(--violet-border);border-radius:var(--corner);padding:3px 8px}
.role .rsrc svg{width:12px;height:12px}
.role-config{display:flex;align-items:flex-end;gap:var(--v16);flex-wrap:wrap;margin-top:var(--v14);padding-top:var(--v14);border-top:1px solid var(--border)}
.rc-block{display:flex;flex-direction:column;gap:6px}
.rc-label{font-size:var(--t-tiny);font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-quaternary)}
.seg{display:inline-flex;background:var(--list);border:1px solid var(--border);border-radius:var(--corner-big);padding:3px;gap:2px}
.seg button{background:transparent;border:0;color:var(--fg-secondary);font:inherit;font-weight:600;font-size:var(--t-sm);padding:7px 12px;border-radius:var(--corner);cursor:pointer}
.seg button[aria-pressed=true]{background:var(--violet);color:#fff}
.stepper-num{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:var(--corner-big);overflow:hidden;background:var(--list)}
.stepper-num button{width:38px;height:38px;background:transparent;border:0;color:var(--fg-primary);font-size:18px;cursor:pointer}
.stepper-num button:hover{background:var(--hl)}
.stepper-num .val{min-width:34px;text-align:center;font-weight:600;font-size:var(--t-md)}
.empty-block{border:1.5px dashed var(--border-hover);border-radius:var(--corner-big);padding:var(--v24);text-align:center;color:var(--fg-tertiary);font-size:var(--t-reg)}

.validate{display:none;align-items:center;gap:var(--v8);margin-top:var(--v16);color:var(--error);font-size:var(--t-reg);font-weight:600}
.validate.show{display:flex}
.validate::before{content:"!";display:flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:1.5px solid var(--error);font-size:11px;font-weight:700;flex:none}

/* footer nav */
.foot{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--border);padding:var(--v12) var(--v20);display:flex;align-items:center;justify-content:space-between;gap:var(--v16);z-index:5}
.foot-inner{max-width:1080px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:var(--v16)}
.foot .left{font-size:var(--t-semi);color:var(--fg-quaternary)}
.foot .left b{color:var(--fg-secondary)}
.foot .right{display:flex;gap:var(--v8)}
#foot{display:none}

/* ===== AI loading ===== */
#loader{position:fixed;inset:0;z-index:30;background:var(--page);display:none;align-items:center;justify-content:center;padding:var(--v24)}
#loader.show{display:flex}
.loader-card{max-width:460px;width:100%;text-align:center}
.loader-orb{width:64px;height:64px;border-radius:18px;margin:0 auto var(--v20);background:linear-gradient(135deg,var(--accent),var(--violet));display:flex;align-items:center;justify-content:center;color:#fff;animation:pulse 1.6s ease-in-out infinite}
.loader-orb svg{width:32px;height:32px}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85}}
.loader-card h2{font-size:var(--d1);font-weight:700}
.loader-card .sub{color:var(--fg-tertiary);font-size:var(--t-md);margin-top:6px}
.loader-steps{margin-top:var(--v24);text-align:left;display:flex;flex-direction:column;gap:var(--v10)}
.lstep{display:flex;align-items:center;gap:var(--v10);font-size:var(--t-reg);color:var(--fg-quaternary);opacity:.5;transition:opacity .25s,color .25s}
.lstep.on{opacity:1;color:var(--fg-secondary)}
.lstep.done{opacity:1;color:var(--fg-primary)}
.lstep .dot{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);flex:none;display:flex;align-items:center;justify-content:center}
.lstep.on .dot{border-color:var(--accent)}
.lstep.on .dot::after{content:"";width:9px;height:9px;border-radius:50%;background:var(--accent);animation:pulse 1s ease-in-out infinite}
.lstep.done .dot{border-color:var(--success);background:var(--success);color:#fff}
.lstep.done .dot::after{content:"\2713";font-size:12px}

@media (max-width:880px){.pods{grid-template-columns:1fr 1fr}}
@media (max-width:620px){.pods,.goals{grid-template-columns:1fr}#welcome h1{font-size:28px}.wrap{padding-top:var(--v24)}}
@media (prefers-reduced-motion:reduce){.loader-orb,.lstep.on .dot::after,#welcome::before{animation:none}}

/* ===== welcome split + feature showcase ===== */
.welcome-split{display:flex;align-items:center;justify-content:center;gap:56px;max-width:1100px;width:100%;position:relative;z-index:1}
.feature-showcase{flex:1 1 0;max-width:540px;min-width:0;position:relative}
@media (min-width:981px){
  .welcome-split .welcome-card{flex:1 1 0;max-width:480px;text-align:left}
  .welcome-split .welcome-card .welcome-mark{margin-left:0;margin-right:auto}
  .welcome-split .welcome-card .welcome-cta{align-items:flex-start}
  .welcome-split .welcome-card .welcome-steps{justify-content:flex-start}
}
@media (max-width:980px){.welcome-split{flex-direction:column;gap:40px}}
@media (max-width:720px){.feature-showcase{display:none}}
.fs-eyebrow{font-size:var(--t-tiny);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:var(--v12)}
.fs-stage{position:relative;height:388px;border-radius:18px;background:linear-gradient(160deg,var(--accent-container),var(--violet-container));border:1px solid var(--border);overflow:hidden}
.fs-arc{position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;border:1.5px solid var(--accent-border);opacity:.5}
.fs-dots{position:absolute;left:16px;bottom:14px;width:88px;height:52px;opacity:.6;background-image:radial-gradient(var(--accent-border) 1.4px,transparent 1.4px);background-size:13px 13px}
.fs-bracket{position:absolute;width:24px;height:58px;border:1.5px solid var(--accent-border);opacity:.55}
.fs-bracket.tl{top:18px;left:14px;border-right:0;border-radius:8px 0 0 8px}

.fs-kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.fs-kpi{background:var(--list);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.fs-kpi .v{font-weight:700;font-size:var(--t-md)}
.fs-kpi .v small{font-size:10px;color:var(--success);font-weight:700}

.fs-board{display:flex;gap:8px;width:100%;max-width:404px}
.fs-col{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;box-shadow:var(--shadow-card)}
.fs-colh{display:flex;justify-content:space-between;font-size:var(--t-tiny);font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--fg-tertiary);margin-bottom:7px}

.fs-cc .pp{display:flex;gap:4px;margin-top:5px}
.fs-pp{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px}
.fs-pp.r{background:var(--error-highlight);color:var(--error-hover)}
.fs-pp.o{background:var(--orange-highlight);color:var(--orange)}
.fs-prog{height:4px;border-radius:4px;background:var(--border);margin-top:6px;overflow:hidden}
.fs-prog i{display:block;height:100%;background:var(--accent)}

/* ===== AI setup guide — in-page side panel ===== */
:root{--aig-w:340px;--aig-gap:24px;--stage-w:1240px}
/* the page-level row that holds the wizard + chat panel, centered within the page */
.setup-stage{display:flex;align-items:flex-start;gap:var(--aig-gap);max-width:var(--stage-w);margin:0 auto;padding:0 var(--v20)}
.setup-stage #wizard{flex:1;min-width:0}
.setup-stage .wrap{max-width:none;padding-left:0;padding-right:0}
/* panel is a normal in-flow column that sticks while the page scrolls */
.aig{width:var(--aig-w);flex:none;align-self:flex-start;position:sticky;top:var(--v20);margin-top:var(--v32);max-height:calc(100vh - 100px);background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-card);overflow:hidden;display:flex;flex-direction:column}
.aig.hide{display:none}
/* when the panel is open, keep the footer buttons aligned under the wizard column */
body.guide-open .foot-inner{max-width:calc(var(--stage-w) - var(--v20) * 2);padding-right:calc(var(--aig-w) + var(--aig-gap))}
.aig-head{display:flex;align-items:center;gap:10px;padding:14px 16px;background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff;flex:none}
.aig-av{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:700;flex:none}
.aig-name{font-weight:600;font-size:var(--t-reg)}
.aig-status{font-size:var(--t-tiny);opacity:.85;display:flex;align-items:center;gap:5px}
.aig-status::before{content:"";width:6px;height:6px;border-radius:50%;background:#7CFFB2}
.aig-min{margin-left:auto;width:28px;height:28px;border-radius:6px;border:0;background:rgba(255,255,255,.18);color:#fff;cursor:pointer;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center}
.aig-min:hover{background:rgba(255,255,255,.32)}
/* body fills the panel height and scrolls on its own */
.aig-body{padding:16px;display:flex;flex-direction:column;gap:10px;flex:1;min-height:0;overflow:auto}
.aig-msg{display:flex;gap:8px;align-items:flex-start}
.aig-msg .b{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none}
.aig-bub{background:var(--list);border:1px solid var(--border);border-radius:10px;border-top-left-radius:3px;padding:9px 11px;font-size:var(--t-semi);color:var(--fg-secondary);line-height:1.5}
.aig-bub b{color:var(--fg-primary);font-weight:600}
.aig-msg.me{flex-direction:row-reverse}
.aig-msg.me .b{background:var(--violet)}
.aig-msg.me .aig-bub{background:var(--accent-container);border-color:var(--accent-border);border-radius:10px;border-top-right-radius:3px;color:var(--fg-primary)}
.aig-chips{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px 16px;border-top:1px solid var(--border);flex:none}
.aig-chip{font-size:var(--t-sm);font-weight:600;border:1px solid var(--accent-border);background:var(--accent-container);color:var(--accent-hover);border-radius:20px;padding:6px 11px;cursor:pointer}
.aig-chip:hover{background:var(--accent-highlight)}
.aig-bubble{position:fixed;right:20px;bottom:78px;width:54px;height:54px;border-radius:50%;border:0;background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff;box-shadow:var(--shadow-modal);cursor:pointer;z-index:8;display:none;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.aig-bubble.show{display:flex}
/* on narrower screens the panel drops below the wizard and the footer reclaims width */
@media (max-width:960px){
  .setup-stage{flex-direction:column}
  .aig{width:100%;position:static;max-height:520px;margin-top:var(--v20)}
  body.guide-open .foot-inner{padding-right:0}
}

/* recruitment header text */
.card-h .rec-head-tx{min-width:0;flex:1}
.card-h .rec-head-tx p{font-size:var(--t-sm);color:var(--fg-tertiary);margin-top:1px;line-height:1.35;font-weight:500}
/* operations experts widget */
.experts-sub{font-size:var(--t-sm);color:var(--fg-tertiary);padding:var(--v10) var(--v16) 0}

/* ===== configuration summary + activation checklist ===== */

const $=s=>document.querySelector(s);
const money=n=>'$'+Number(n).toLocaleString();
function goSetup(){if(window.openSetupFlow)window.openSetupFlow();}
const initials=n=>n.trim().split(/\s+/).map(w=>w[0]||"").join("").slice(0,2).toUpperCase()||"AG";
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const CHECK=`<svg class="ic" viewBox="0 0 24 24" style="width:14px;height:14px"><polyline points="5 12 10 17 19 7"/></svg>`;
function ring(pct,size,sw,color,label){const r=(size-sw)/2,c=2*Math.PI*r,off=c*(1-pct/100);return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex:none"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--hl)" stroke-width="${sw}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" font-size="${Math.round(size*.26)}" font-weight="700" fill="var(--fg-primary)">${label}</text></svg>`;}

let BUILDING=false, JUST_BUILT=false, BUILD_TIMER=null;

function applySetup(sel, building){
  SETUP.goals=sel.goals||[];SETUP.pods=sel.pods||[];SETUP.roles=sel.roles||[];
  if(sel.tools&&sel.tools.length)SIGNUP.tools=sel.tools;
  BUILDING=!!building;
  render();
  var a=document.getElementById('ovApp');if(a)a.style.display='';
  window.scrollTo({top:0});
  if(BUILDING)startBuild();
}
window.applySetup=applySetup;

/* The command center builds as a background widget on the overview, then the banner
   morphs into the "Setup complete" success state with Activate / Edit actions. */
function startBuild(){
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  var pods=activePods();
  var specialists=pods.reduce(function(a,p){return a+podHeadcount(p);},0);
  var agents=pods.reduce(function(a,p){return a+(POD_META[p]?POD_META[p].ai:0);},0);
  /* V2: the user just watched the design loader, so keep this short and tight —
     4 steps at a quicker cadence rather than 6 slow ones. */
  var steps=[
    "Configuring "+pods.length+" operation pod"+(pods.length!==1?"s":""),
    "Deploying "+agents+" AI agents and "+specialists+" specialist"+(specialists!==1?"s":""),
    "Connecting your tools to the HQZen Database",
    "Assembling your command center"
  ];
  var el=document.getElementById('buildSteps');
  if(!el){finishBuild();return;}
  el.innerHTML=steps.map(function(s){return '<div class="bstep"><span class="bdot"></span><span>'+esc(s)+'</span></div>';}).join('');
  var nodes=el.querySelectorAll('.bstep');
  var bar=document.querySelector('.hero-building .build-bar i');
  var pct=document.getElementById('buildPct');
  var sub=document.getElementById('buildSub');
  function setProg(p){if(bar)bar.style.width=p+'%';if(pct)pct.textContent=Math.round(p)+'%';}
  var i=0, per=reduce?140:380;
  function tick(){
    if(i>0){nodes[i-1].classList.remove('on');nodes[i-1].classList.add('done');}
    if(i<nodes.length){
      nodes[i].classList.add('on');
      setProg(Math.round((i/nodes.length)*100));
      i++;BUILD_TIMER=setTimeout(tick,per);
    }else{
      setProg(100);
      if(sub)sub.textContent="Done — your workspace is ready.";
      BUILD_TIMER=setTimeout(finishBuild,reduce?200:700);
    }
  }
  tick();
}
function finishBuild(){
  if(BUILD_TIMER){clearTimeout(BUILD_TIMER);BUILD_TIMER=null;}
  BUILDING=false;JUST_BUILT=true;

/* V2.1 pricing constants. Centralised so a single edit changes the whole flow. */
const PRICING={
  toolFeePerMo:    25,     // each connected tool, billed monthly
  freeFirstTool:   "Gmail",// the promoted free connector
  perHireFee:      250,    // one-time, charged separately on hire
  recruitmentBase: 0       // general recruitment feature itself is bundled
};

function activateData(){
  var pods=activePods();
  var agents=pods.reduce(function(a,p){return a+(POD_META[p]?POD_META[p].ai:0);},0);
  var specialists=pods.reduce(function(a,p){return a+podHeadcount(p);},0);
  var podsSubtotal=pods.reduce(function(a,p){return a+(POD_META[p]?POD_META[p].price:0);},0);
  var C=window.HQZEN_CONFIG||{};
  /* Tool connector fees. Gmail (the promoted tool) is free during signup. */
  var toolsList=(SIGNUP.tools||[]).slice();
  var paidTools=toolsList.filter(function(t){return t!==PRICING.freeFirstTool;});
  var freeToolPresent=toolsList.indexOf(PRICING.freeFirstTool)>=0;
  var toolsSubtotal=paidTools.length*PRICING.toolFeePerMo;
  var monthly=podsSubtotal+toolsSubtotal;
  return {
    pods:pods, agents:agents, specialists:specialists,
    podsSubtotal:podsSubtotal, toolsSubtotal:toolsSubtotal, monthly:monthly,
    toolsList:toolsList, paidTools:paidTools, freeToolPresent:freeToolPresent,
    perHireFee:PRICING.perHireFee, freeToolName:PRICING.freeFirstTool,
    company:C.company||state.company||SIGNUP.company,
    first:C.first||SIGNUP.firstName,
    size:C.size||SIGNUP.seats,
    pkg:C.pkg||SIGNUP.package,
    seats:SIGNUP.seats,

    "Technology / SaaS":{pods:["engineering","it","customer","executive"],goals:["reporting","support","time"]},

    "Professional Services":{pods:["executive","sales","people","growth"],goals:["time","revenue","hire"]},

  function listJoin(a){if(a.length<=1)return a[0]||'';if(a.length===2)return a[0]+' and '+a[1];return a.slice(0,-1).join(', ')+', and '+a[a.length-1];}
  function money(n){return '$'+n.toLocaleString();}
  function stars(r){var full=Math.round(r);var s='';for(var i=0;i<5;i++)s+=(i<full?'\u2605':'\u2606');return s;}

        (pick?'<div style="margin-top:8px"><span class="aipick">'+SRC+'AI pick for you</span></div>':'')+

        '<div class="pod-team"><span class="pod-chip h"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="3.2"/><path d="M5 20a7 7 0 0114 0"/></svg>'+p.human+' Human</span><span class="pod-chip a"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l1.7 5L19 8.7 14 10.4 12 16l-1.9-5.6L5 8.7 10.3 7z"/></svg>'+p.ai+' AI Agents</span></div>'+
        '<div class="pod-rate"><span class="stars">'+stars(p.rate)+'</span><b>'+p.rate.toFixed(1)+'</b><span>('+p.clients+' clients)</span></div>'+

      '</div></div>';
  }
  function renderPods(){
    var wrap=$("#pods");wrap.innerHTML=PODS.map(podCard).join('');
    wrap.querySelectorAll('.pod').forEach(function(card){
      var key=card.dataset.pod;
      card.querySelector('.pod-toggle').addEventListener('click',function(){
        if(state.pods.has(key))state.pods.delete(key);else state.pods.add(key);
        renderPods();$("#podsValidate").classList.remove('show');

  }
  function renderPodRec(){
    var names=REC.pods.map(function(k){return PODMAP[k].name;});
    $("#podRec").innerHTML='<span class="spark">'+SPARK+'</span><div class="arx"><div class="arl">HQZen AI · '+esc(ctx.industry)+'</div>'+
      '<div class="art">Based on your industry and goals, we recommend <b>'+listJoin(names)+'</b>. They\'re added below and marked <b>AI pick</b> — remove any you don\'t need.</div></div>';
  }

  /* ---------- STEP 3: team ---------- */
  function renderRoles(){
    var rolesEl=$("#roles");var pods=Array.from(state.pods);
    if(!pods.length){rolesEl.innerHTML='<div class="empty-block">No packages selected yet. Go back to step 2 to add at least one package.</div>';return;}

      var p=PODMAP[k];var st=state.roles[k];
      var segs=SEN.map(function(s,i){return '<button type="button" data-sen="'+i+'" aria-pressed="'+(st.seniority===i?'true':'false')+'">'+s+'</button>';}).join('');

  function renderTeamRec(){

  function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

    step=t;

    if(t==="team"){renderTeamRec();renderRoles();}

    document.querySelectorAll('#stepper .stp').forEach(function(b){
      var bi=ORDER.indexOf(b.dataset.step);
      b.classList.toggle('active',bi===idx);b.classList.toggle('done',bi<idx);b.disabled=bi>idx;

    $("#nextBtn").textContent=NEXT[t];

  $("#nextBtn").addEventListener('click',function(){
    var idx=ORDER.indexOf(step);

    if(step==="packages"&&!state.pods.size){$("#podsValidate").classList.add('show');return;}
    if(step==="team"&&!state.pods.size){$("#teamValidate").classList.add('show');return;}
    if(idx<ORDER.length-1)gotoStep(ORDER[idx+1]);else finish();
  });
  $("#backBtn").addEventListener('click',function(){var idx=ORDER.indexOf(step);if(idx>0)gotoStep(ORDER[idx-1]);});
  document.querySelectorAll('#stepper .stp').forEach(function(b){b.addEventListener('click',function(){if(!b.disabled)gotoStep(b.dataset.step);});});

  /* ---------- welcome → wizard ---------- */
  $("#startBtn").addEventListener('click',function(){

  /* ---------- finish → AI loading → redirect ---------- */
  function buildURL(){
    var pods=Array.from(state.pods);

    document.getElementById('foot').style.display='block';
    document.getElementById('loader').classList.remove('show');

    window.scrollTo({top:0});

  /* ---------- feature showcase carousel ---------- */

    var stage=document.getElementById('fsStage');

      '<b>Boards &amp; tasks</b> — see every project at a glance',
      '<b>AI Copilot</b> — it does the next step, not just summaries',
      '<b>Command center</b> — live output, quality, and cost',
      '<b>Connected tools &amp; pods</b> — one operating system'
    ];
    var dotsWrap=document.getElementById('fsDots'), capEl=document.getElementById('fsCap'), idx=0, timer=null;
    scenes.forEach(function(_,i){var b=document.createElement('button');b.className='fs-dot'+(i===0?' on':'');b.setAttribute('aria-label','Feature '+(i+1));b.addEventListener('click',function(){go(i);rest();});dotsWrap.appendChild(b);});
    var dots=dotsWrap.children;
    function go(i){idx=i;scenes.forEach(function(s,j){s.classList.toggle('show',j===i);});for(var k=0;k<dots.length;k++)dots[k].classList.toggle('on',k===i);if(capEl)capEl.innerHTML=caps[i];}
    function rest(){if(timer)clearInterval(timer);if(!reduce)timer=setInterval(function(){go((idx+1)%scenes.length);},3800);}
    go(0);rest();
    stage.addEventListener('mouseenter',function(){if(timer)clearInterval(timer);});
    stage.addEventListener('mouseleave',rest);
  })();

  /* ---------- AI setup guide (Zen) ---------- */
  var aig=document.getElementById('aiGuide'), aigBody=document.getElementById('aigBody'), aigChips=document.getElementById('aigChips'), aigBubble=document.getElementById('aigBubble');
  var GUIDE={
    welcome:{m:"Hi, I'm Zen, your HQZen setup guide. I'll walk you through three quick steps — Goals, Packages, and Team. Hit <b>Set up my workspace</b> when you're ready.",c:["What will I get?","How long does it take?"]},

<script>
/* ===== Unified-flow boot: skip welcome/setup, go straight to the overview, which
   renders with the building progress bar shown on the overview itself. ===== */
(function(){
  var OP_TO_POD={exec:'executive',customer:'customer',revenue:'sales',talent:'people',finance:'executive'};
  var DEFAULT_PODS=['executive','customer','people'];
  function rolesFor(pods){return pods.map(function(k){return {key:k,count:(POD_META[k]?POD_META[k].human:1)};});}
  function setupFrom(op){
    var pods=[];
    if(op&&op.ops&&op.ops.length){op.ops.forEach(function(k){var p=OP_TO_POD[k];if(p&&pods.indexOf(p)<0)pods.push(p);});}
    if(!pods.length)pods=DEFAULT_PODS.slice();
    if(op){
      if(op.company){SIGNUP.company=op.company;state.company=op.company;}
      if(op.first){SIGNUP.firstName=op.first;}
      if(op.size){SIGNUP.seats=op.size;state.seats=op.size;}
      if(op.opNames&&op.opNames.length){SIGNUP.opNames=op.opNames;}
      if(op.workflows){SIGNUP.workflows=op.workflows;}
      if(op.workflowNames&&op.workflowNames.length){SIGNUP.workflowNames=op.workflowNames;}
      if(op.pkg){SIGNUP.package=op.pkg;}
      if(op.pains&&op.pains.length){SIGNUP.pains=op.pains;}
      if(op.tools&&op.tools.length){SIGNUP.tools=op.tools;}
    }
    return {goals:[],pods:pods,roles:rolesFor(pods),tools:(op&&op.tools&&op.tools.length?op.tools:null)};
  }
  function hideSetup(){var s=document.getElementById('setupFlow');if(s)s.style.display='none';document.body.classList.remove('guide-open');document.body.style.overflow='';}
  var BOOTED=false;
  window.HQZEN_BOOT=function(op){if(BOOTED)return;BOOTED=true;window.HQZEN_CONFIG=op||null;hideSetup();window.applySetup(setupFrom(op),true);};
  window.addEventListener('load',function(){setTimeout(function(){if(!BOOTED){BOOTED=true;hideSetup();window.applySetup(setupFrom(null),true);}},140);});
})();
</script>
