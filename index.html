  --accent:#008FF5;--accent-hover:#0374C7;--accent-container:#EDF7FE;--accent-highlight:#DBEDFD;--accent-border:#6EBEF9;--accent-dark:#083E6A;
  --error:#ED2B42;--error-container:#FAEDEE;--error-highlight:#F6DADD;--error-border:#F28390;--error-hover:#BF2335;
  --success:#06B169;--success-container:#EBFEF6;--success-highlight:#D8FEEE;--success-border:#6FD8AC;--success-hover:#059458;
  --warning:#F5C024;--warning-container:#FDF9ED;--warning-highlight:#FBF4DB;--warning-border:#F8DA80;--warning-dark:#977718;
  --indigo:#3974EA;--indigo-container:#EEF2FC;--indigo-highlight:#DCE5F9;--indigo-border:#8BADF2;
  --violet:#A052F4;--violet-container:#F3ECFD;--violet-highlight:#E7DAFA;--violet-border:#C496F7;
  --orange:#FA7F42;--orange-container:#FCF2EC;--orange-highlight:#FAE5D9;--orange-border:#FAB28E;
  --teal:#23BFCD;--teal-container:#F0FBFC;
  --page:var(--grey-10);--card:var(--grey-0);--float:var(--grey-0);--pane:var(--grey-0);--list:var(--grey-5);
  --fg-primary:var(--grey-90);--fg-secondary:var(--grey-70);--fg-tertiary:var(--grey-60);--fg-quaternary:var(--grey-50);--fg-disabled:var(--grey-40);
  --border:var(--grey-30);--border-hover:var(--grey-40);--hl:var(--grey-10);--container:var(--grey-5);
  --corner:4px;--corner-big:8px;
  --shadow-card:0 1px 2px rgba(12,13,14,.06),0 1px 3px rgba(12,13,14,.05);
  --shadow-dd:0 4px 12px rgba(12,13,14,.10);
  --v2:2px;--v4:4px;--v6:6px;--v8:8px;--v10:10px;--v12:12px;--v14:14px;--v16:16px;--v20:20px;--v24:24px;--v32:32px;
  --t-tiny:10px;--t-sm:12px;--t-semi:13px;--t-reg:14px;--t-md:16px;--d3:18px;--d2:20px;--d1:24px;
  --pane-w:236px;--rail-w:340px;
}
[data-theme="dark"]{
  --grey-0:#121516;--grey-5:#1C1F21;--grey-10:#262A2D;--grey-20:#313639;--grey-30:#3B4145;
  --grey-40:#5C6164;--grey-50:#7C8083;--grey-60:#9DA0A2;--grey-70:#BEC0C1;--grey-80:#DEDFE0;--grey-90:#FFFFFF;
  --accent-container:#0A233B;--accent-highlight:#083E6A;--error-container:#33090C;--error-highlight:#62121A;
  --success-container:#023B23;--success-highlight:#035935;--warning-container:#382D0B;--warning-highlight:#675211;
  --indigo-container:#0A1635;--indigo-highlight:#162E62;--violet-container:#1B0537;--violet-highlight:#3C1866;
  --orange-container:#371706;--orange-highlight:#683115;
  --page:#121516;--card:var(--grey-5);--float:var(--grey-10);--pane:var(--grey-5);--list:var(--grey-10);
  --shadow-card:0 1px 2px rgba(0,0,0,.4);--shadow-dd:0 4px 14px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--page);color:var(--fg-primary);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums}
svg.ic{width:1.25em;height:1.25em;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
.c-sec{color:var(--fg-secondary)}.c-ter{color:var(--fg-tertiary)}.c-qua{color:var(--fg-quaternary)}
.c-accent{color:var(--accent)}.c-success{color:var(--success)}.c-error{color:var(--error)}
.bold{font-weight:600}.t-sm{font-size:var(--t-sm)}.t-tiny{font-size:var(--t-tiny)}

.iconbox{width:28px;height:28px;border-radius:var(--corner);display:flex;align-items:center;justify-content:center;background:var(--hl);color:var(--fg-secondary);flex:none}
.iconbox.blue{background:var(--accent-container);color:var(--accent)}.iconbox.green{background:var(--success-container);color:var(--success)}
.iconbox.red{background:var(--error-container);color:var(--error)}.iconbox.yellow{background:var(--warning-container);color:var(--warning-dark)}
.iconbox.violet{background:var(--violet-container);color:var(--violet)}.iconbox.orange{background:var(--orange-container);color:var(--orange)}.iconbox.indigo{background:var(--indigo-container);color:var(--indigo)}
.status{display:inline-flex;align-items:center;gap:3px;font-size:var(--t-tiny);font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:var(--hl);color:var(--fg-secondary)}
.status.blue{background:var(--accent-highlight);color:var(--accent-hover)}.status.green{background:var(--success-highlight);color:var(--success-hover)}
.status.red{background:var(--error-highlight);color:var(--error-hover)}.status.yellow{background:var(--warning-highlight);color:var(--warning-dark)}.status.violet{background:var(--violet-highlight);color:var(--violet)}.status.orange{background:var(--orange-highlight);color:var(--orange)}

/* shell */
.app{display:grid;grid-template-columns:var(--pane-w) 1fr;min-height:100vh}
.pane{background:var(--pane);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:var(--v16) var(--v8);gap:var(--v2);position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:var(--v10);padding:var(--v8) var(--v10) var(--v16)}
.brand .mark{width:30px;height:30px;border-radius:var(--corner-big);background:linear-gradient(135deg,var(--accent),var(--accent-hover));display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
.brand b{font-size:var(--d3);letter-spacing:-.01em}
.org{display:flex;align-items:center;gap:var(--v8);margin:0 var(--v8) var(--v12);padding:var(--v8);border:1px solid var(--border);border-radius:var(--corner);cursor:pointer}
.org:hover{border-color:var(--border-hover)}.org .o-name{font-weight:600;font-size:var(--t-semi)}.org .o-plan{font-size:11px;color:var(--fg-tertiary)}
.sec{font-size:var(--t-tiny);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-quaternary);padding:var(--v12) var(--v10) var(--v4);font-weight:600}
.nav{display:flex;align-items:center;gap:var(--v12);padding:var(--v8) var(--v10);border-radius:var(--corner);color:var(--fg-secondary);cursor:pointer;font-size:var(--t-semi)}
.nav:hover{background:var(--hl)}.nav.active{background:var(--accent-container);color:var(--accent);font-weight:600}
.nav .cnt{margin-left:auto;background:var(--error);color:#fff;font-size:var(--t-tiny);font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.pane-foot{margin-top:auto;display:flex;align-items:center;gap:var(--v10);padding:var(--v10);border-top:1px solid var(--border)}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex:none;background:var(--violet-highlight);color:var(--violet);width:32px;height:32px;font-size:var(--t-sm)}

.main{display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;gap:var(--v16);padding:var(--v12) var(--v24);background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
.crumbs{display:flex;align-items:center;gap:var(--v8);font-size:var(--t-semi);color:var(--fg-tertiary)}.crumbs b{color:var(--fg-primary)}
.search{margin-left:auto;width:300px;display:flex;align-items:center;gap:var(--v8);background:var(--list);border:1px solid var(--border);border-radius:var(--corner);padding:var(--v8) var(--v12);color:var(--fg-tertiary)}
.search input{border:0;background:transparent;outline:0;color:var(--fg-primary);font-size:var(--t-semi);flex:1;font-family:inherit}
.iconbtn{width:36px;height:36px;border-radius:var(--corner);border:0;background:transparent;color:var(--fg-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.iconbtn:hover{background:var(--hl)}.iconbtn .dot{position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:50%;background:var(--error);border:2px solid var(--card)}

.content{padding:var(--v24);display:flex;flex-direction:column;gap:var(--v20);max-width:1400px;width:100%;margin:0 auto}

/* greeting */
.greeting{display:flex;align-items:flex-end;justify-content:space-between;gap:var(--v16);flex-wrap:wrap}
.greeting h1{font-size:var(--d1);font-weight:600;letter-spacing:-.02em}.greeting h1 .wave{color:var(--fg-secondary);font-weight:500}
.greeting .sub{display:flex;align-items:center;gap:6px;color:var(--fg-tertiary);font-size:var(--t-reg);margin-top:3px}.greeting .sub b{color:var(--fg-secondary)}

.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--card);color:var(--fg-secondary);border-radius:var(--corner);padding:7px 12px;font-size:var(--t-semi);font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--hl);border-color:var(--border-hover)}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn.primary:hover{background:var(--accent-hover)}
.btn.sm{padding:5px 10px;font-size:var(--t-sm)}.btn.green{background:var(--success);border-color:var(--success);color:#fff}.btn.green:hover{background:var(--success-hover)}
.btn.ghost{border-color:transparent;background:transparent}

/* recruitment band (now top, full width) */
.recruit-band{display:flex;align-items:center;gap:var(--v20);padding:var(--v16) var(--v20);border:1px solid var(--indigo-border);border-radius:var(--corner-big);background:linear-gradient(120deg,var(--indigo-container),var(--card) 70%);box-shadow:var(--shadow-card);flex-wrap:wrap}
.recruit-band .r-ic{width:44px;height:44px;border-radius:var(--corner-big);background:var(--indigo);color:#fff;display:flex;align-items:center;justify-content:center;flex:none}
.recruit-band .r-copy{flex:1;min-width:200px}
.recruit-band .r-eyebrow{font-size:var(--t-tiny);text-transform:uppercase;letter-spacing:.06em;font-weight:700;color:var(--indigo)}
.recruit-band .r-big{font-size:var(--d2);font-weight:600;letter-spacing:-.02em}
.recruit-band .r-stats{display:flex;gap:var(--v24)}
.recruit-band .r-stats .s .n{font-size:var(--d3);font-weight:600}.recruit-band .r-stats .s .t{font-size:11px;color:var(--fg-tertiary)}
.recruit-band .r-cta{display:flex;gap:var(--v8)}
@media (max-width:900px){.recruit-band .r-stats{display:none}}

/* demo banner */
.demo-banner{display:flex;align-items:center;gap:var(--v10);padding:var(--v10) var(--v16);background:var(--warning-container);border:1px solid var(--warning-border);border-radius:var(--corner-big);font-size:var(--t-semi)}
.demo-banner .db-ic{width:26px;height:26px;border-radius:var(--corner);background:var(--warning);color:#fff;display:flex;align-items:center;justify-content:center;flex:none}
.demo-banner b{font-weight:600}.demo-banner .db-link{margin-left:auto;color:var(--accent);font-weight:600;cursor:pointer;white-space:nowrap}

/* activation + demo split */
.welcome-split{display:grid;grid-template-columns:1fr;gap:var(--v20);align-items:stretch}
@media (max-width:1080px){.welcome-split{grid-template-columns:1fr}}
.activate{display:flex;flex-direction:column;padding:var(--v20);border:1px solid var(--accent-border);border-radius:var(--corner-big);background:linear-gradient(160deg,var(--accent-container),var(--card) 60%);box-shadow:var(--shadow-card)}
.activate .a-eyebrow{font-size:var(--t-tiny);text-transform:uppercase;letter-spacing:.06em;font-weight:700;color:var(--accent)}
.activate h2{font-size:var(--d2);font-weight:600;letter-spacing:-.01em;margin-top:2px}
.activate .a-sub{font-size:var(--t-semi);color:var(--fg-tertiary);margin-top:3px}
.a-progress{display:flex;align-items:center;gap:var(--v10);margin:var(--v14) 0}
.a-progress .pbar{flex:1;height:8px;border-radius:20px;background:var(--hl);overflow:hidden}
.a-progress .pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--success))}
.a-progress .pl{font-size:var(--t-sm);font-weight:600;color:var(--fg-secondary)}
.a-steps{display:flex;flex-direction:column;gap:var(--v8);margin-top:var(--v4)}
.a-step{display:flex;align-items:center;gap:var(--v10);padding:var(--v10) var(--v12);border:1px solid var(--border);border-radius:var(--corner);background:var(--card);cursor:pointer}
.a-step:hover{border-color:var(--accent-border)}
.a-step.done{opacity:.6}
.a-step .a-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex:none;display:flex;align-items:center;justify-content:center;color:#fff}
.a-step.done .a-check{background:var(--success);border-color:var(--success)}
.a-step .a-body{flex:1;min-width:0}.a-step .a-title{font-size:var(--t-semi);font-weight:600}.a-step .a-desc{font-size:var(--t-sm);color:var(--fg-tertiary)}
.a-step.done .a-title{text-decoration:line-through;text-decoration-color:var(--fg-quaternary)}
.a-step .a-go{color:var(--fg-quaternary);flex:none}
.a-foot{margin-top:auto;padding-top:var(--v16);display:flex;gap:var(--v8);align-items:center}

.demo-preview{position:relative;border:1px solid var(--border);border-radius:var(--corner-big);background:var(--card);box-shadow:var(--shadow-card);overflow:hidden;display:flex;flex-direction:column}
.demo-preview .dp-head{display:flex;align-items:center;gap:var(--v8);padding:var(--v12) var(--v16);border-bottom:1px solid var(--border)}
.demo-preview .dp-head h3{font-size:var(--t-reg);font-weight:600}
.demo-preview .dp-body{padding:var(--v16);display:flex;flex-direction:column;gap:var(--v12);flex:1}
.dp-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--v8)}
.dp-kpi{border:1px solid var(--border);border-radius:var(--corner);padding:var(--v10) var(--v12)}
.dp-kpi .v{font-size:var(--d2);font-weight:600;line-height:1}.dp-kpi .l{font-size:var(--t-tiny);color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:3px}
.dp-row{display:flex;align-items:center;gap:var(--v8);font-size:var(--t-sm)}
.dp-row .dp-name{font-weight:600;flex:1}
.demo-preview .dp-foot{padding:var(--v10) var(--v16);border-top:1px solid var(--border);text-align:center}

/* sample tag */
.sample-tag{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:1px 6px;border-radius:20px;background:var(--warning-highlight);color:var(--warning-dark)}

/* locked affordance */
.lock-ic{color:var(--fg-quaternary);margin-left:4px}

/* upgrade modal */
.modal-scrim{position:fixed;inset:0;background:rgba(12,13,14,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:var(--v20)}
.modal-scrim.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--corner-big);box-shadow:0 12px 40px rgba(0,0,0,.3);max-width:440px;width:100%;overflow:hidden}
.modal .m-hero{padding:var(--v24) var(--v24) var(--v16);text-align:center;background:linear-gradient(160deg,var(--accent-container),var(--card))}
.modal .m-ic{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto var(--v12)}
.modal h2{font-size:var(--d2);font-weight:600}
.modal .m-sub{font-size:var(--t-semi);color:var(--fg-tertiary);margin-top:4px}
.modal .m-body{padding:var(--v16) var(--v24) var(--v24)}
.modal .m-feat{display:flex;align-items:flex-start;gap:var(--v10);padding:var(--v8) 0}
.modal .m-feat .fi{color:var(--success);flex:none;margin-top:1px}
.modal .m-feat .ft{font-size:var(--t-semi)}.modal .m-feat .fd{font-size:var(--t-sm);color:var(--fg-tertiary)}
.modal .m-actions{display:flex;flex-direction:column;gap:var(--v8);margin-top:var(--v16)}
.modal .btn{justify-content:center;padding:10px}
.modal .m-close{position:absolute;top:var(--v16);right:var(--v16);cursor:pointer;color:var(--fg-tertiary)}

/* quick actions */
.quick{display:flex;gap:var(--v8);flex-wrap:wrap}
.qa{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:var(--corner);padding:8px 12px;cursor:pointer;font-size:var(--t-semi);font-weight:600;color:var(--fg-secondary)}
.qa .qi{color:var(--accent)}.qa:hover{border-color:var(--accent-border);color:var(--accent)}
.qa.primary{background:var(--accent);border-color:var(--accent);color:#fff}.qa.primary .qi{color:#fff}.qa.primary:hover{background:var(--accent-hover)}

/* KPI strip (no sparklines now) */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--v12)}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--corner-big);box-shadow:var(--shadow-card);padding:var(--v16);display:flex;flex-direction:column;gap:var(--v6)}
.kpi .k-top{display:flex;align-items:center;justify-content:space-between}
.kpi .k-lbl{font-size:var(--t-tiny);letter-spacing:.05em;text-transform:uppercase;color:var(--fg-tertiary);font-weight:600}
.kpi .k-val{font-size:28px;font-weight:600;letter-spacing:-.02em;line-height:1}
.kpi .k-val .suf{font-size:var(--t-sm);color:var(--fg-quaternary);font-weight:400;margin-left:2px}
.kpi .k-foot{display:flex;align-items:center;gap:6px}
.delta{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:700;color:var(--success)}.delta.neg{color:var(--error)}
.k-foot .fl{font-size:var(--t-tiny);color:var(--fg-quaternary)}

/* action band */
.action-head{display:flex;align-items:center;gap:var(--v8);margin-bottom:var(--v12)}
.action-head h2{font-size:var(--d3);font-weight:600}
.action-head .pulse{width:8px;height:8px;border-radius:50%;background:var(--error);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(237,43,66,.4)}70%{box-shadow:0 0 0 7px rgba(237,43,66,0)}100%{box-shadow:0 0 0 0 rgba(237,43,66,0)}}
.see-more{margin-left:auto;color:var(--accent);font-size:var(--t-sm);font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:3px}.see-more:hover{text-decoration:underline}
.action-band{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--v12)}
.action-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:var(--corner-big);box-shadow:var(--shadow-card);padding:var(--v16);cursor:pointer;transition:transform .12s ease}
.action-card:hover{transform:translateY(-2px)}
.action-card.red{border-left-color:var(--error)}.action-card.orange{border-left-color:var(--orange)}.action-card.blue{border-left-color:var(--accent)}.action-card.yellow{border-left-color:var(--warning)}.action-card.violet{border-left-color:var(--violet)}
.action-card .ac-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:var(--v12)}
.action-card .ac-big{font-size:26px;font-weight:600;line-height:1}
.action-card .ac-title{font-weight:600;font-size:var(--t-reg)}
.action-card .ac-sub{font-size:var(--t-sm);color:var(--fg-tertiary);margin-top:2px}
.action-card .ac-cta{display:inline-flex;align-items:center;gap:3px;color:var(--accent);font-size:var(--t-sm);font-weight:600;margin-top:var(--v12)}

/* AI insight */
.ai{display:flex;gap:var(--v12);padding:var(--v16);border:1px solid var(--violet-border);border-radius:var(--corner-big);background:linear-gradient(135deg,var(--violet-container),var(--accent-container))}
.ai .badge{width:34px;height:34px;border-radius:var(--corner);background:linear-gradient(135deg,var(--violet),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;flex:none}
.ai .tag{display:inline-flex;align-items:center;gap:4px;font-size:var(--t-tiny);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--violet)}
.ai p{margin-top:3px;font-size:var(--t-semi);color:var(--fg-secondary)}.ai p b{color:var(--fg-primary)}

/* grid + cards */
.grid{display:grid;grid-template-columns:1fr var(--rail-w);gap:var(--v20);align-items:start}
.col{display:flex;flex-direction:column;gap:var(--v20);min-width:0}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--corner-big);box-shadow:var(--shadow-card)}
.card-h{display:flex;align-items:center;gap:var(--v8);padding:var(--v14) var(--v16) var(--v12)}
.card-h h3{font-size:var(--t-reg);font-weight:600;flex:0 0 auto}.card-h .sp{flex:1}
.card-b{padding:0 var(--v16) var(--v16)}

/* ATTENDANCE NOW (redesigned team pulse) */
.att-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--v10);padding:0 var(--v16) var(--v12)}

function ring(value,size=48,th=6,color="var(--accent)",label){
  const r=(size-th)/2,c=2*Math.PI*r,off=c*(1-value/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--hl)" stroke-width="${th}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${th}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" font-size="${size*0.3}" font-weight="600" fill="var(--fg-primary)">${label!=null?label:value}</text></svg>`;
}

function wireIntent(){

    q.textContent.trim()+" is a paid feature","Start your subscription to "+q.textContent.trim().toLowerCase()+" with your real workspace."));

  document.querySelectorAll(".action-card").forEach(c=>c.onclick=()=>openUpgrade(
    "Take action on real data","This demo shows what you'll manage here. Subscribe to act on your own team's items."));
  // any Approve / Review / Issue / Hire / Clearance button inside the demo
  document.querySelectorAll(".btn.green, .btn.primary").forEach(b=>{
    if(b.closest(".modal")||b.closest(".activate")||b.closest(".greeting")||b.closest(".demo-banner")) return;
    b.onclick=()=>openUpgrade("Bring in your real team","Subscribe to replace the demo with your live workspace and unlock every feature.");
  });
}

  function bootPaid(cfg){
    var w = paidFrame.contentWindow; if(!w || typeof w.HQZEN_PAID_BOOT !== 'function') return false;
    try { w.HQZEN_PAID_BOOT(cfg||lastPaidCfg); return true; } catch(e){ return false; }
  }
  window.HQZEN_SHOW_PAID = function(cfg){
    lastPaidCfg = cfg || lastPaidCfg;
    if(!paidLoaded){ paidFrame.srcdoc = document.getElementById('paidDoc').innerHTML; }
    else { bootPaid(lastPaidCfg); }
    operationStage.classList.remove('active');
    workspaceStage.classList.remove('active');
    paidStage.classList.add('active');
    label.textContent = 'Workspace active';
    sub.textContent = 'Subscription confirmed';
    back.style.display = '';
    document.title = 'HQZen — Active workspace';
    window.scrollTo({top:0});
  };
  function showWorkspace(){
    readProfile();
    bar.classList.remove('show');
    if(!workspaceLoaded){ workspaceFrame.srcdoc = document.getElementById('workspaceDoc').innerHTML; }
    setTimeout(function(){
      operationStage.classList.remove('active');
      workspaceStage.classList.add('active');
      label.textContent = 'Workspace overview';
      sub.textContent = 'Your setup is complete';
      /* V2: the design form is in a terminal "done" state — no Back from here. */
      back.style.display = 'none';
      document.title = 'HQZen — Workspace overview';
      bar.classList.add('show');
    }, reduce ? 0 : 220);
  }
  function showOperation(){
    workspaceStage.classList.remove('active');
    operationStage.classList.add('active');
    label.textContent = 'Build Your AI Organisation';
    sub.textContent = 'Blueprint → workspace handoff';
    back.style.display = 'none';
  }
  /* V2: in the new flow the design-complete postMessage drives the handoff, so the
     legacy #bookBtn never renders. This interceptor is kept only as a fallback and
     stops as soon as the workspace is shown (handoffDone) to avoid a 20s idle loop. */
  var handoffDone = false;
  function interceptOperationCTA(){
    var d = docOf(operationFrame); if(!d) return;
    var tries = 0;
    (function bind(){
      if(handoffDone) return;
      var btn = d.getElementById('bookBtn');
      if(btn && !btn.dataset.unifiedBound){
        btn.dataset.unifiedBound = 'true';
        btn.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          if(e.stopImmediatePropagation) e.stopImmediatePropagation();
          showWorkspace();
          return false;
        }, true);
        return;
      }
      if(tries++ < 80) setTimeout(bind, 250);
    })();
  }
  function interceptWorkspaceOverview(){
    var d = docOf(workspaceFrame); if(!d) return;
    setWorkspaceProfile();
    workspaceLoaded = true;
    var obs = new MutationObserver(function(){
      var ov = d.getElementById('ovApp');
      if(ov){
        var visible = getComputedStyle(ov).display !== 'none';
        if(visible){ label.textContent='Workspace overview'; sub.textContent='Your setup is complete'; }
      }
    });
    obs.observe(d.documentElement, {attributes:true, childList:true, subtree:true});
  }
  operationFrame.addEventListener('load', function(){ operationLoaded = true; interceptOperationCTA(); setTimeout(function(){bar.classList.add('show')}, 600); });
  workspaceFrame.addEventListener('load', function(){ interceptWorkspaceOverview(); bootWorkspace(); });
  paidFrame.addEventListener('load', function(){ paidLoaded = true; bootPaid(lastPaidCfg); });

  /* V2: listen for the design-complete signal from the operationFrame iframe */
  window.addEventListener('message', function(e){
    if(e.data && e.data.type === 'hqzen-design-complete'){
      handoffDone = true;
      showWorkspace();
    }
    if(e.data && e.data.type === 'hqzen-show-command-center'){
      window.HQZEN_SHOW_PAID();
    }
  });
  function backHandler(){
    /* V2: Back only returns from the active (paid) stage to the workspace overview.
       The design form is terminal once the workspace opens, so there is no
       workspace -> form path. */
    if(paidStage.classList.contains('active')){
      paidStage.classList.remove('active');
      workspaceStage.classList.add('active');
      label.textContent = 'Workspace overview';
      sub.textContent = 'Your setup is complete';
      back.style.display = 'none';
    }
  }
  back.addEventListener('click', backHandler);
  operationFrame.srcdoc = document.getElementById('operationDoc').innerHTML;
})();
</script>
</body>
</html>
