<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HQZen — Build Your AI Organisation</title>
<style>
  :root{
    --bg:#080B1F; --panel:#0D1330; --line:rgba(124,138,255,.18);
    --ink:#F4F6FF; --muted:#AEB6E0; --accent:#7C8AFF; --teal:#2DD4BF;
    --shadow:0 24px 70px -32px rgba(0,0,0,.85);
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
  .workflow-shell{position:fixed;inset:0;background:radial-gradient(780px 520px at -8% -8%,rgba(124,138,255,.24),transparent 62%),radial-gradient(780px 520px at 108% 108%,rgba(45,212,191,.16),transparent 60%),var(--bg)}
  .handoff-bar{position:fixed;top:16px;left:50%;z-index:20;transform:translateX(-50%);display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(13,19,48,.82);backdrop-filter:blur(16px);box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease}
  .handoff-bar.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
  .handoff-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 18px var(--teal)}
  .handoff-label{font-size:13px;font-weight:700;white-space:nowrap;color:var(--ink)}
  .handoff-sub{font-size:12px;color:var(--muted);white-space:nowrap}
  .handoff-btn{border:1px solid rgba(124,138,255,.32);background:rgba(124,138,255,.14);color:var(--ink);border-radius:999px;padding:7px 12px;font:inherit;font-size:12px;font-weight:700;cursor:pointer}
  .handoff-btn:hover{background:rgba(124,138,255,.24)}
  .stage{position:absolute;inset:0;opacity:0;visibility:hidden;transform:translateY(10px);transition:opacity .42s ease,transform .42s ease,visibility .42s}
  .stage.active{opacity:1;visibility:visible;transform:none}
  iframe{display:block;width:100%;height:100%;border:0;background:transparent}
  .transition-card{position:fixed;left:50%;top:50%;z-index:30;width:min(420px,calc(100vw - 40px));padding:28px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,rgba(17,23,59,.96),rgba(12,17,48,.96));box-shadow:var(--shadow);transform:translate(-50%,-50%) scale(.96);opacity:0;visibility:hidden;transition:opacity .25s ease,transform .25s ease,visibility .25s;text-align:center}
  .transition-card.show{opacity:1;visibility:visible;transform:translate(-50%,-50%) scale(1)}
  .loader-mark{width:52px;height:52px;margin:0 auto 16px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--teal));display:grid;place-items:center;color:#08112A;font-weight:900;font-size:22px;box-shadow:0 0 40px rgba(124,138,255,.35)}
  .transition-card h1{font-size:22px;line-height:1.15;margin:0 0 8px;letter-spacing:-.02em}
  .transition-card p{margin:0;color:var(--muted);font-size:14px;line-height:1.55}
  .progress{height:6px;border-radius:999px;background:rgba(124,138,255,.14);overflow:hidden;margin-top:20px}
  .progress i{display:block;height:100%;width:44%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--teal));animation:load 1s ease-in-out infinite alternate}
  @keyframes load{to{transform:translateX(130%);}}
  @media (prefers-reduced-motion:reduce){.stage,.transition-card,.handoff-bar{transition:none}.progress i{animation:none;width:100%}}
  @media (max-width:720px){.handoff-bar{left:12px;right:12px;transform:none;border-radius:16px;justify-content:space-between}.handoff-bar.show{transform:none}.handoff-sub{display:none}}
</style>
</head>
<body>
<div class="workflow-shell" aria-label="Unified HQZen workflow">
  <div class="handoff-bar" id="handoffBar">
    <span class="handoff-dot" aria-hidden="true"></span>
    <span class="handoff-label" id="handoffLabel">Build Your AI Organisation</span>
    <span class="handoff-sub" id="handoffSub">One HTML workflow</span>
    <button class="handoff-btn" id="backToDesigner" type="button" style="display:none">Back to blueprint</button>
  </div>
  <section class="stage active" id="operationStage" aria-label="Operation designer"><iframe id="operationFrame" title="Build Your AI Organisation"></iframe></section>
  <section class="stage" id="workspaceStage" aria-label="Workspace setup and overview"><iframe id="workspaceFrame" title="HQZen workspace setup"></iframe></section>
  <section class="stage" id="paidStage" aria-label="Active workspace"><iframe id="paidFrame" title="HQZen active workspace"></iframe></section>
  <div class="transition-card" id="transitionCard" aria-live="polite">
    <div class="loader-mark">H</div>
    <h1>Building your HQZen workspace</h1>
    <p>Carrying your organisation blueprint into the guided setup, workspace build, and overview.</p>
    <div class="progress" aria-hidden="true"><i></i></div>
  </div>
</div>

    --white:#EEF1FF; --muted:#9AA3C7; --muted-dim:#6B7398; --danger:#FF8095;
    --ring:0 0 0 2px var(--navy-900),0 0 0 4px var(--teal);
    --shadow-card:0 18px 50px -24px rgba(0,0,0,.85);
    --display:'Bricolage Grotesque',system-ui,sans-serif;
    --body:'Hanken Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--navy-900);color:var(--white);font-family:var(--body);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;}
  .ambient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;}
  .orb.a{width:520px;height:520px;top:-180px;left:-120px;background:radial-gradient(circle,var(--periwinkle),transparent 65%);}
  .orb.b{width:480px;height:480px;bottom:-200px;right:-140px;background:radial-gradient(circle,var(--teal),transparent 65%);opacity:.4;}
  .orb.c{width:360px;height:360px;top:42%;left:56%;background:radial-gradient(circle,var(--periwinkle-soft),transparent 70%);opacity:.2;}
  @media (prefers-reduced-motion:no-preference){
    .orb.a{animation:drift 22s ease-in-out infinite alternate;}
    .orb.b{animation:drift 28s ease-in-out infinite alternate-reverse;}
    @keyframes drift{to{transform:translate(40px,30px) scale(1.08);}}
  }

  .mast{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:36px;}
  .brand{display:flex;align-items:center;gap:11px;font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:-.01em;}
  .brand .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--periwinkle),var(--teal));box-shadow:0 0 22px -4px var(--periwinkle);}
  .step-flag{font-size:13px;color:var(--muted);font-weight:500;}
  .eyebrow{font-family:var(--body);font-weight:600;font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin:0 0 16px;}

  .hero{margin-bottom:30px;}
  .hero h1{font-family:var(--display);font-weight:800;font-size:clamp(34px,5.4vw,58px);line-height:1.03;letter-spacing:-.025em;margin:0 0 16px;max-width:17ch;}
  .hero h1 em{font-style:normal;color:var(--periwinkle);}
  .hero .lede{font-size:clamp(15.5px,2vw,18px);color:var(--muted);max-width:56ch;margin:0 0 24px;}
  .pillars{display:flex;flex-wrap:wrap;gap:9px;}
  .pillar{display:inline-flex;align-items:center;gap:8px;padding:8px 13px;border-radius:10px;background:var(--navy-850);border:1px solid var(--navy-700);font-size:13px;font-weight:600;color:var(--white);}
  .pillar .pd{width:7px;height:7px;border-radius:50%;flex:none;}
  .pillar:nth-child(-n+2) .pd{background:var(--periwinkle);box-shadow:0 0 8px 1px var(--periwinkle);}
  .pillar:nth-child(n+3) .pd{background:var(--teal);box-shadow:0 0 8px 1px var(--teal);}

  .panel{background:linear-gradient(180deg,var(--navy-800),var(--navy-850));border:1px solid var(--navy-700);border-radius:22px;padding:0;box-shadow:var(--shadow-card);overflow:hidden;}

  [class^="zeni-"]::before, [class*=" zeni-"]::before {
    font-family: 'zeni' !important;
    font-style: normal;
    font-weight: normal;
    font-variant: normal;
    text-transform: none;
    line-height: 1;
    display: inline-block;
    -webkit-font-smoothing: antialiased;
  }
  .zeni-briefcase::before   { content: '\EA55'; }
  .zeni-messages::before    { content: '\EB52'; }
  .zeni-chart-line::before  { content: '\EA8A'; }
  .zeni-workforce::before   { content: '\EC1E'; }
  .zeni-wallet::before      { content: '\EC1A'; }
  .zeni-sparkle::before     { content: '\EBC9'; }
  .zeni-industry::before    { content: '\EA62'; }
  /* stepper */
  .stepper{display:flex;align-items:center;gap:6px;padding:20px 26px;border-bottom:1px solid var(--navy-700);flex-wrap:wrap;}
  .stp{display:inline-flex;align-items:center;gap:10px;background:transparent;border:0;cursor:pointer;color:var(--muted-dim);font-family:var(--body);font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:6px 4px;transition:color .15s;}
  .stp:disabled{cursor:default;}
  .stp .num{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--navy-600);display:grid;place-items:center;font-size:12px;letter-spacing:0;transition:.15s;}
  .stp:focus-visible{outline:none;box-shadow:var(--ring);border-radius:8px;}
  .stp.active{color:var(--white);}
  .stp.active .num{border-color:var(--periwinkle);background:var(--periwinkle);color:var(--navy-900);}
  .stp.done{color:var(--muted);}
  .stp.done .num{border-color:var(--teal);color:var(--teal);}
  .stp.done .num::after{content:"✓";}
  .stp.done .num span{display:none;}
  .stp-div{flex:1;min-width:14px;height:1px;background:var(--navy-700);}
  @media (max-width:560px){
    .stepper{padding:16px 16px;gap:4px;}
    .stp{font-size:0;gap:0;padding:4px;}
    .stp .num{font-size:12px;}
    .stp-div{min-width:8px;}
  }

  .step{display:none;padding:30px 30px 30px;}
  .step.show{display:block;}
  .step-head{margin-bottom:24px;}
  .step-head h2{font-family:var(--display);font-weight:800;font-size:clamp(24px,3.4vw,32px);letter-spacing:-.02em;margin:0 0 6px;}
  .step-head p{color:var(--muted);font-size:15px;margin:0;}

  .field{margin-bottom:22px;}
  .field:last-child{margin-bottom:0;}
  label,.flabel{display:flex;align-items:baseline;gap:9px;font-weight:600;font-size:14px;color:var(--white);margin-bottom:9px;}
  .flabel{font-family:var(--display);font-size:16px;letter-spacing:-.01em;}
  .hint{font-family:var(--body);font-weight:500;font-size:12.5px;color:var(--muted-dim);}
  .opt{font-weight:500;font-size:12.5px;color:var(--muted-dim);}
  .req{color:var(--periwinkle);font-size:12.5px;font-weight:600;}

  .grid2{display:grid;grid-template-columns:1fr;gap:16px;}
  @media (min-width:581px){.grid2{grid-template-columns:1fr 1fr;gap:18px;}}

  input[type=text],input[type=email],input[type=tel],input[type=url],select{
    width:100%;min-height:50px;background:var(--navy-900);border:1px solid var(--navy-700);border-radius:12px;
    color:var(--white);font-family:var(--body);font-size:15px;font-weight:500;padding:0 16px;transition:border-color .15s,box-shadow .15s;}
  select{appearance:none;cursor:pointer;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 20px) 22px,calc(100% - 15px) 22px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;color:var(--white);}
  select.placeheld{color:var(--muted-dim);}

  /* multi-select industry tags */
  .tagsel{display:flex;flex-wrap:wrap;gap:9px;}
  .tagopt{display:inline-flex;align-items:center;gap:6px;min-height:42px;padding:0 16px;border-radius:999px;background:var(--navy-900);border:1px solid var(--navy-700);color:var(--white);font:inherit;font-weight:600;font-size:13.5px;cursor:pointer;transition:transform .12s,border-color .15s,background .15s;}
  .tagopt:hover{border-color:var(--navy-600);transform:translateY(-1px);}
  .tagopt:focus-visible{outline:none;box-shadow:var(--ring);}
  .tagopt .ck{width:0;height:15px;overflow:hidden;display:inline-flex;align-items:center;color:var(--periwinkle-soft);transition:width .14s,margin .14s;}
  .tagopt .ck svg{width:15px;height:15px;flex:none;}
  .tagopt[aria-pressed=true]{border-color:var(--periwinkle);background:rgba(124,138,255,.13);}
  .tagopt[aria-pressed=true] .ck{width:16px;}
  input::placeholder{color:var(--muted-dim);}
  input:hover,select:hover{border-color:var(--navy-600);}
  input:focus-visible,select:focus-visible{outline:none;border-color:var(--periwinkle);box-shadow:0 0 0 3px rgba(124,138,255,.22);}
  input.err{border-color:var(--danger);}

  /* team size segmented */
  /* team-size slider */
  .sizes{display:block;}
  .size-readout{display:flex;align-items:baseline;gap:11px;margin-bottom:16px;}
  .size-readout .rv{font-family:var(--display);font-weight:800;font-size:27px;letter-spacing:-.02em;color:var(--white);line-height:1;font-variant-numeric:tabular-nums;}
  .size-readout .rd{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--periwinkle-soft);background:rgba(124,138,255,.13);border:1px solid var(--navy-600);border-radius:8px;padding:5px 11px;}
  .range-wrap{position:relative;padding:6px 0;}
  input[type=range].srange{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:999px;cursor:pointer;outline:none;margin:0;
    background:linear-gradient(90deg,var(--periwinkle) 0%,var(--periwinkle) var(--pct,25%),var(--navy-700) var(--pct,25%),var(--navy-700) 100%);}
  input[type=range].srange:focus-visible{box-shadow:var(--ring);}
  input[type=range].srange::-webkit-slider-runnable-track{height:8px;border-radius:999px;background:transparent;}
  input[type=range].srange::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:var(--white);border:5px solid var(--periwinkle);box-shadow:0 5px 16px -3px rgba(0,0,0,.7),0 0 0 5px rgba(124,138,255,.16);cursor:grab;margin-top:-8px;transition:transform .12s,box-shadow .15s;}
  input[type=range].srange::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.1);}
  input[type=range].srange::-moz-range-track{height:8px;border-radius:999px;background:var(--navy-700);}
  input[type=range].srange::-moz-range-progress{height:8px;border-radius:999px;background:var(--periwinkle);}
  input[type=range].srange::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--white);border:5px solid var(--periwinkle);box-shadow:0 5px 16px -3px rgba(0,0,0,.7);cursor:grab;}
  .range-ticks{display:flex;justify-content:space-between;gap:6px;margin-top:14px;}
  .range-ticks button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:0;cursor:pointer;font-family:inherit;color:var(--muted-dim);padding:4px 2px;border-radius:9px;transition:color .15s;}
  .range-ticks button:first-child{align-items:flex-start;}
  .range-ticks button:last-child{align-items:flex-end;}
  .range-ticks button .tk{font-family:var(--display);font-weight:700;font-size:13px;}
  .range-ticks button .tl{font-size:9.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;line-height:1.2;text-align:center;}
  .range-ticks button:hover{color:var(--muted);}
  .range-ticks button.on{color:var(--periwinkle-soft);}
  .range-ticks button:focus-visible{outline:none;box-shadow:var(--ring);}
  @media (max-width:580px){
    .range-ticks{flex-wrap:wrap;gap:8px;}
    .range-ticks button{flex:1 1 calc(33.333% - 8px);min-height:44px;padding:8px;border:1px solid var(--navy-600);border-radius:10px;background:rgba(124,138,255,.04);}
    .range-ticks button.on{background:rgba(124,138,255,.18);border-color:var(--periwinkle);color:var(--white);}
    .range-ticks button .tl{display:none;}
    input[type=range].srange::-webkit-slider-thumb{width:28px;height:28px;}
  }

  /* operation selector */
  .ops{display:flex;flex-direction:column;gap:13px;}
  .op{border:1px solid var(--navy-700);border-radius:16px;background:var(--navy-900);overflow:hidden;transition:border-color .15s;}
  .op.sel{border-color:var(--periwinkle);}
  .op-head{display:flex;align-items:center;gap:15px;width:100%;text-align:left;background:transparent;border:0;cursor:pointer;color:var(--white);padding:17px 19px;font-family:inherit;}
  .op-head:focus-visible{outline:none;box-shadow:var(--ring);border-radius:16px;}
  .op-glyph{width:46px;height:46px;border-radius:13px;flex:none;display:grid;place-items:center;color:var(--navy-900);background:radial-gradient(circle at 32% 28%,var(--periwinkle-soft),var(--periwinkle));box-shadow:0 0 22px -5px var(--periwinkle);transition:filter .2s;font-size:22px;}
  .op-glyph svg{width:24px;height:24px;} .op-glyph i{font-size:22px;line-height:1;}
  .op:not(.sel) .op-glyph{filter:grayscale(.5) brightness(.82);}
  .op-meta{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:2px;}
  .op-name{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.01em;display:block;}
  .op-tag{font-size:13px;color:var(--muted);display:block;}
  .op-count{font-size:12px;font-weight:600;color:var(--muted-dim);white-space:nowrap;}
  .op-check{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--navy-600);flex:none;display:grid;place-items:center;transition:.15s;}
  .op.sel .op-check{border-color:var(--periwinkle);background:var(--periwinkle);}
  .op.sel .op-check::after{content:"";width:9px;height:5px;border-left:2px solid var(--navy-900);border-bottom:2px solid var(--navy-900);transform:rotate(-45deg) translateY(-1px);}
  .op-expand{display:none;padding:2px 19px 20px;border-top:1px solid var(--navy-700);}
  .op.sel .op-expand{display:block;}
  .sub-label{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted-dim);margin:16px 0 11px;}
  .wf-grid{display:grid;grid-template-columns:1fr;gap:9px;}
  @media (min-width:581px){.wf-grid{grid-template-columns:1fr 1fr;}}
  .wf{display:flex;align-items:center;gap:11px;min-height:44px;padding:0 13px;border-radius:11px;background:var(--navy-850);border:1px solid var(--navy-700);cursor:pointer;color:var(--white);font-family:var(--body);font-size:14px;font-weight:500;transition:.13s;text-align:left;}
  .wf:hover{border-color:var(--navy-600);}
  .wf:focus-visible{outline:none;box-shadow:var(--ring);}
  .wf .box{width:19px;height:19px;border-radius:6px;border:1.5px solid var(--navy-600);flex:none;display:grid;place-items:center;transition:.13s;}
  .wf[aria-pressed=true]{border-color:var(--periwinkle);background:rgba(124,138,255,.10);}
  .wf[aria-pressed=true] .box{border-color:var(--periwinkle);background:var(--periwinkle);}
  .wf[aria-pressed=true] .box::after{content:"";width:8px;height:4px;border-left:2px solid var(--navy-900);border-bottom:2px solid var(--navy-900);transform:rotate(-45deg) translateY(-1px);}

  /* "Included with HQZen" — Talent Operations card (always-on) */
  .op-included{position:relative;border:1px solid rgba(45,212,191,.32);border-radius:16px;background:linear-gradient(135deg,rgba(45,212,191,.08),rgba(124,138,255,.05));padding:18px 19px;margin-bottom:14px;}
  .op-included .inc-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(45,212,191,.16);border:1px solid rgba(45,212,191,.32);border-radius:999px;padding:4px 11px;font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:14px;}
  .op-included .inc-badge svg{width:13px;height:13px;}
  .op-included .inc-head{display:flex;align-items:flex-start;gap:13px;margin-bottom:14px;}
  .op-included .inc-glyph{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;color:var(--navy-900);background:radial-gradient(circle at 32% 28%,var(--periwinkle-soft),var(--periwinkle));}
  .op-included .inc-glyph svg{width:20px;height:20px;}
  .op-included .inc-tx{min-width:0;flex:1;}
  .op-included .inc-name{font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:-.01em;}
  .op-included .inc-sub{font-size:13.5px;color:var(--muted);margin-top:3px;line-height:1.45;}
  .op-included .inc-wfs{display:flex;flex-wrap:wrap;gap:8px;}
  .op-included .inc-wf{display:inline-flex;align-items:center;gap:7px;background:rgba(124,138,255,.06);border:1px solid var(--navy-700);border-radius:10px;padding:8px 13px;font-size:13px;font-weight:600;color:var(--white);}
  .op-included .inc-wf svg{width:13px;height:13px;color:var(--teal);flex:none;}

  /* divider between included and selectable ops */
  .ops-divider{display:flex;align-items:center;gap:13px;margin:22px 0 18px;color:var(--muted-dim);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;}
  .ops-divider::before,.ops-divider::after{content:"";flex:1;height:1px;background:var(--navy-700);}

  /* Step 4 Gmail-first hero — Gmail is the free tier, not a discount */
  .promo-banner{padding:18px 18px 16px;margin-bottom:22px;border:1px solid rgba(45,212,191,.34);border-radius:16px;background:linear-gradient(135deg,rgba(45,212,191,.09),rgba(124,138,255,.05));}
  .promo-banner.gmail-hero{display:block;}
  .promo-head{display:flex;gap:14px;align-items:flex-start;}
  .promo-ic{width:42px;height:42px;border-radius:11px;background:rgba(45,212,191,.18);color:var(--teal);display:grid;place-items:center;flex:none;}
  .promo-ic.gmail{background:#fff;}
  .promo-ic.gmail svg{width:24px;height:24px;}
  .promo-tx{flex:1;min-width:0;}
  .promo-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:var(--display);font-weight:700;font-size:15.5px;letter-spacing:-.01em;color:var(--white);}
  .promo-pill{font-size:9.5px;letter-spacing:.12em;font-weight:700;color:var(--teal);background:rgba(45,212,191,.16);border:1px solid rgba(45,212,191,.28);border-radius:999px;padding:2px 8px;}
  .promo-pill.free{color:#9af3df;background:rgba(45,212,191,.22);border-color:rgba(45,212,191,.38);}
  .promo-sub{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.55;}
  .promo-sub b{color:var(--white);font-weight:700;}
  /* Connect Gmail action row */
  .promo-actions{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06);}
  .ga-idle{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .connect-gmail-btn{display:inline-flex;align-items:center;gap:10px;padding:10px 18px;background:#fff;color:#1f1f1f;border:1px solid rgba(0,0,0,.12);border-radius:10px;font-family:var(--display);font-weight:600;font-size:14px;cursor:pointer;transition:transform .12s ease,box-shadow .15s ease;box-shadow:0 1px 2px rgba(0,0,0,.06),0 2px 6px rgba(0,0,0,.08);letter-spacing:-.005em;}
  .connect-gmail-btn:hover{transform:translateY(-1px);box-shadow:0 2px 4px rgba(0,0,0,.08),0 6px 14px rgba(0,0,0,.12);}
  .connect-gmail-btn:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(124,138,255,.55);}
  .connect-gmail-btn svg{flex:none;}
  .ga-meta{font-size:12px;color:var(--muted-dim);}
  .ga-connected{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .ga-status{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;background:rgba(45,212,191,.14);border:1px solid rgba(45,212,191,.32);color:#9af3df;font-size:13px;font-weight:600;}
  .ga-status b{color:#fff;font-weight:600;}
  .ga-status svg{color:var(--teal);}
  .ga-disconnect{background:none;border:none;color:var(--muted-dim);font-size:12.5px;cursor:pointer;text-decoration:underline;text-underline-offset:3px;font-family:inherit;padding:4px 6px;border-radius:6px;}
  .ga-disconnect:hover{color:var(--white);}
  /* Gmail → Board mini visualization */
  .gmail-viz{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:stretch;margin-top:16px;padding:12px;background:rgba(8,11,31,.42);border:1px solid rgba(124,138,255,.16);border-radius:12px;}
  .gmv-side{display:flex;flex-direction:column;gap:6px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:9px;min-width:0;}
  .gmv-h{display:flex;align-items:center;gap:6px;padding:2px 4px 6px;border-bottom:1px solid rgba(255,255,255,.06);}
  .gmv-dot{width:8px;height:8px;border-radius:50%;}
  .gmv-dot.red{background:#ff6b6b;}.gmv-dot.yel{background:#fcd34d;}.gmv-dot.grn{background:#34d399;}
  .gmv-lbl{font-family:var(--display);font-weight:700;font-size:11px;letter-spacing:.02em;color:var(--white);margin-left:2px;}
  .gmv-pill{margin-left:auto;font-size:8.5px;font-weight:800;letter-spacing:.08em;color:#08112A;background:linear-gradient(135deg,#7C8AFF,#2DD4BF);padding:2px 7px;border-radius:999px;}
  .gmv-mail{display:flex;gap:8px;align-items:center;padding:6px 4px;border-radius:7px;}
  .gmv-mail:hover{background:rgba(255,255,255,.03);}
  .gmv-av{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:10px;color:#fff;flex:none;}
  .gmv-av.a{background:#EA4335;}.gmv-av.b{background:#3B7CF6;}.gmv-av.c{background:#7C8AFF;}
  .gmv-mt{display:flex;flex-direction:column;min-width:0;line-height:1.3;}
  .gmv-mt b{font-size:11px;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gmv-mt span{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gmv-arrow{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--teal);min-width:80px;}
  .gmv-arrow span{font-size:10px;font-weight:600;color:var(--teal);text-align:center;letter-spacing:.01em;}
  .gmv-col{display:flex;flex-direction:column;gap:5px;margin-top:6px;}
  .gmv-coltop{display:flex;align-items:center;justify-content:space-between;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-dim);padding:0 2px;}
  .gmv-coltop span{font-family:var(--display);font-weight:800;color:var(--periwinkle);background:rgba(124,138,255,.16);padding:1px 6px;border-radius:999px;font-size:10px;}
  .gmv-card{font-size:11px;color:var(--white);background:rgba(124,138,255,.08);border:1px solid rgba(124,138,255,.2);border-left:2.5px solid var(--periwinkle);border-radius:6px;padding:6px 8px;display:flex;flex-direction:column;gap:3px;line-height:1.3;}
  .gmv-card.high{border-left-color:#ff8095;background:rgba(255,128,149,.08);}
  .gmv-tag{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-dim);}
  @media (max-width:640px){.gmail-viz{grid-template-columns:1fr;}.gmv-arrow{flex-direction:row;min-width:0;padding:4px;}.gmv-arrow svg{transform:rotate(90deg);}}

  /* Op confidence badge */
  .op-confidence-badge{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--teal);background:rgba(45,212,191,.14);border:1px solid rgba(45,212,191,.28);border-radius:999px;padding:3px 9px;white-space:nowrap;flex:none;margin-right:6px;}

  /* AI Recommendation badge variant on talent card */
  .inc-badge.ai-rec{background:rgba(124,138,255,.18);border-color:rgba(124,138,255,.32);color:var(--periwinkle-soft);}
  .inc-confidence{font-size:12px;font-weight:700;color:var(--teal);margin-top:8px;}

  /* Full-screen org-build loading */
  .org-build-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px;padding:48px 24px 24px;}
  .org-build-av{width:64px;height:64px;border-radius:20px;background:radial-gradient(circle at 32% 28%,var(--periwinkle-soft),var(--periwinkle));display:grid;place-items:center;font-size:30px;color:var(--navy-900);margin-bottom:4px;}
  .org-build-brand{font-family:var(--display);font-weight:800;font-size:22px;letter-spacing:-.01em;color:var(--white);}
  .org-build-ai{color:var(--periwinkle-soft);}
  .org-build-title{font-size:17px;font-weight:700;color:var(--muted);margin-top:2px;}
  .org-build-sub{font-size:13.5px;color:var(--muted-dim);min-height:20px;}
  .org-build-bar{width:100%;max-width:360px;height:5px;background:var(--navy-700);border-radius:999px;overflow:hidden;margin:10px 0 4px;}
  .org-build-fill{height:100%;background:linear-gradient(90deg,var(--periwinkle),var(--teal));border-radius:999px;width:0;transition:width .5s ease;}
  .org-build-pct{font-size:12px;font-weight:700;color:var(--muted);min-height:16px;}
  .org-build-steps{display:flex;flex-direction:column;gap:9px;text-align:left;max-width:320px;margin:12px auto 0;padding:0 24px;}
  .obs-step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted-dim);transition:color .25s;}
  .obs-step.active{color:var(--white);}
  .obs-step.done{color:var(--teal);}
  .obs-dot{width:7px;height:7px;border-radius:50%;background:var(--navy-600);flex:none;transition:background .25s;}
  .obs-step.active .obs-dot{background:var(--periwinkle);box-shadow:0 0 0 3px rgba(124,138,255,.22);}
  .obs-step.done .obs-dot{background:var(--teal);}

  /* ── Review/Summary stage (after AI loading) ── */
  .review-stage{display:none;min-height:100vh;padding:48px 0 60px;}
  .review-stage.show{display:block;}
  .rv-shell{max-width:920px;margin:0 auto;padding:0 24px;}
  .rv-head{text-align:center;margin-bottom:32px;}
  .rv-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--periwinkle-soft);margin-bottom:14px;}
  .rv-spark{width:24px;height:24px;border-radius:7px;background:radial-gradient(circle at 32% 28%,var(--periwinkle-soft),var(--periwinkle));display:grid;place-items:center;color:var(--navy-900);font-size:13px;}
  .rv-title{font-family:var(--display);font-weight:800;font-size:34px;line-height:1.1;letter-spacing:-.02em;color:var(--white);margin:0 0 12px;}
  .rv-sub{font-size:15px;color:var(--muted);max-width:600px;margin:0 auto;line-height:1.55;}
  .rv-sub b{color:var(--white);font-weight:600;}

  .rv-section{margin-top:32px;}
  .rv-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px;}
  .rv-section-h{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:-.005em;color:var(--white);}
  .rv-section-meta{font-size:12px;color:var(--muted-dim);font-weight:600;}

  .rv-ops{display:flex;flex-direction:column;gap:12px;}
  .rv-op-card{border:1px solid var(--navy-700);border-radius:14px;background:var(--navy-900);padding:16px 18px;cursor:pointer;transition:border-color .15s,opacity .15s,background .15s;}
  .rv-op-card:hover{border-color:var(--navy-600);}
  .rv-op-card.sel{border-color:rgba(124,138,255,.45);background:linear-gradient(135deg,rgba(124,138,255,.06),rgba(45,212,191,.04));}
  .rv-op-card:not(.sel){opacity:.55;}
  .rv-op-head{display:flex;align-items:center;gap:13px;}
  .rv-op-glyph{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;background:radial-gradient(circle at 32% 28%,var(--periwinkle-soft),var(--periwinkle));color:var(--navy-900);font-size:18px;}
  .rv-op-tx{flex:1;min-width:0;}
  .rv-op-name{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:-.005em;color:var(--white);}
  .rv-op-rat{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4;}
  .rv-op-rat b{color:var(--white);font-weight:600;}
  .rv-op-conf{font-size:11.5px;font-weight:700;letter-spacing:.04em;color:var(--teal);background:rgba(45,212,191,.14);border:1px solid rgba(45,212,191,.28);border-radius:999px;padding:4px 10px;white-space:nowrap;flex:none;}
  .rv-op-check{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--navy-600);display:grid;place-items:center;color:transparent;transition:.15s;flex:none;}
  .rv-op-check svg{width:14px;height:14px;}
  .rv-op-card.sel .rv-op-check{background:var(--teal);border-color:var(--teal);color:var(--navy-900);}
  .rv-op-wfs{display:flex;flex-wrap:wrap;gap:6px;margin-top:13px;}
  .rv-wf-pill{font-size:11px;font-weight:600;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--navy-700);border-radius:8px;padding:4px 10px;}
  .rv-wf-pill.more{color:var(--periwinkle-soft);border-color:rgba(124,138,255,.32);}

  .rv-gmail-banner{display:flex;align-items:center;gap:14px;padding:14px 16px;margin-bottom:14px;border:1px solid rgba(45,212,191,.32);border-radius:14px;background:linear-gradient(135deg,rgba(45,212,191,.08),rgba(124,138,255,.04));}
  .rv-gmail-ic{width:40px;height:40px;border-radius:10px;background:#fff;display:grid;place-items:center;flex:none;}
  .rv-gmail-tx{flex:1;min-width:0;}
  .rv-gmail-h{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:700;font-size:14px;color:var(--white);}
  .rv-gmail-pill{font-size:9.5px;letter-spacing:.12em;font-weight:700;color:var(--teal);background:rgba(45,212,191,.16);border:1px solid rgba(45,212,191,.28);border-radius:999px;padding:2px 8px;}

  /* tools step */

  .tgname .tgico{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:var(--navy-900);background:radial-gradient(circle at 32% 28%,var(--periwinkle-soft),var(--periwinkle));}
  .tgname .tgico svg{width:16px;height:16px;} .tgname .tgico i{font-size:15px;line-height:1;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;}
  .tool{display:inline-flex;align-items:center;gap:9px;min-height:46px;padding:0 15px 0 9px;border-radius:12px;cursor:pointer;background:var(--navy-900);border:1px solid var(--navy-700);color:var(--white);font-family:var(--body);font-weight:600;font-size:14px;transition:transform .12s,border-color .15s,background .15s;}

  /* challenges / pain points (mobile-first: 1 col, expand on wider screens) */
  .pains{display:grid;grid-template-columns:1fr;gap:10px;}
  @media (min-width:600px){.pains{grid-template-columns:1fr 1fr;}}
  .pain{display:flex;align-items:center;gap:13px;text-align:left;width:100%;min-height:64px;padding:13px 15px;border-radius:14px;cursor:pointer;background:var(--navy-900);border:1px solid var(--navy-700);color:var(--white);font-family:inherit;transition:transform .12s,border-color .15s,background .15s;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;min-height:50px;padding:0 24px;border-radius:13px;border:0;cursor:pointer;font-family:var(--display);font-weight:700;font-size:15.5px;letter-spacing:-.01em;transition:transform .12s,box-shadow .15s,background .15s,opacity .15s;}

  /* drafting */
  .draft-stage{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0;background:var(--navy-900);}

  .draft-sub{color:var(--muted);font-size:16px;margin:0 0 38px;}
  .steps{width:100%;max-width:540px;text-align:left;display:flex;flex-direction:column;gap:4px;}
  .stepline{display:flex;align-items:center;gap:14px;padding:12px 4px;font-size:15.5px;font-weight:500;color:var(--muted-dim);opacity:0;transform:translateY(6px);transition:opacity .35s,transform .35s,color .35s;}
  .stepline.in{opacity:1;transform:none;color:var(--white);}
  .stepline .tick{width:22px;height:22px;border-radius:50%;flex:none;display:grid;place-items:center;border:1.5px solid var(--navy-600);position:relative;}
  .stepline.in .tick{border-color:var(--teal);}
  .stepline.in .tick::after{content:"";width:9px;height:5px;border-left:2px solid var(--teal);border-bottom:2px solid var(--teal);transform:rotate(-45deg) translateY(-1px);}
  .stepline.active .tick{border-color:var(--periwinkle);}
  .stepline.active .tick::before{content:"";position:absolute;inset:-1.5px;border-radius:50%;border:1.5px solid transparent;border-top-color:var(--periwinkle);animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion:reduce){.stepline{transition:none;}.stepline.active .tick::before{animation:none;border-top-color:var(--periwinkle);}}

  /* output */

  .card-top{display:flex;align-items:center;gap:15px;margin-bottom:20px;padding-right:34px;}

  .card-glyph svg{width:26px;height:26px;}

  .wfr .wdrop:hover{color:var(--danger);border-color:var(--navy-700);}
  .wfr .wdrop:focus-visible{outline:none;box-shadow:var(--ring);}
  .oversight{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;border-radius:12px;background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.28);font-size:13.5px;color:var(--teal-soft);margin-bottom:20px;line-height:1.5;}
  .oversight .he{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 9px 1px var(--teal);flex:none;margin-top:5px;}

  .tier-card{background:linear-gradient(150deg,rgba(124,138,255,.14),var(--navy-850) 60%);border:1px solid var(--navy-600);border-radius:20px;padding:26px;}

  .integration{font-size:14.5px;color:var(--muted);margin:0 0 34px;line-height:1.55;}

  /* assistant intro */

  .assistant .atext{font-size:13.5px;color:var(--muted);line-height:1.5;}

  /* ai suggestion banner (ops) */
  .airec{display:flex;align-items:flex-start;gap:13px;padding:15px 17px;border-radius:14px;background:linear-gradient(120deg,rgba(124,138,255,.15),rgba(45,212,191,.07));border:1px solid var(--navy-600);margin-bottom:18px;}

  /* package editor */

  .pkgopt .pk-desc{display:block;font-size:13px;color:var(--muted);margin-top:4px;line-height:1.45;}
  .pkg-foot{font-size:13px;color:var(--muted-dim);margin:14px 0 0;line-height:1.5;}

  /* dashboard */
  .dash-stage{display:none;position:relative;z-index:1;max-width:1040px;margin:0 auto;padding:32px clamp(22px,4vw,52px) 96px;}
  .dash-stage.show{display:block;animation:fadeup .5s ease both;}
  @media (prefers-reduced-motion:reduce){.dash-stage.show{animation:none;}}
  .dash-banner{display:flex;align-items:center;gap:16px;justify-content:space-between;flex-wrap:wrap;padding:18px 22px;border-radius:16px;background:linear-gradient(120deg,rgba(124,138,255,.16),rgba(45,212,191,.08));border:1px solid var(--navy-600);margin-bottom:24px;}
  .dash-banner .bx{min-width:0;}
  .dash-banner .bt{font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:-.01em;}
  .dash-banner .bs{font-size:13.5px;color:var(--muted);margin-top:3px;}
  .preview-pill{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:8px;background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.4);color:var(--teal-soft);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px;}
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px;}
  @media (max-width:760px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
  .kpi{position:relative;background:linear-gradient(180deg,var(--navy-800),var(--navy-850));border:1px solid var(--navy-700);border-radius:16px;padding:18px;overflow:hidden;}
  .kpi .klabel{font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:8px;}
  .kpi .kval{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .kpi .kdelta{font-size:12px;font-weight:600;margin-top:4px;color:var(--teal);}
  .dash-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-bottom:24px;}
  @media (max-width:820px){.dash-grid{grid-template-columns:1fr;}}
  .widget{position:relative;background:linear-gradient(180deg,var(--navy-800),var(--navy-850));border:1px solid var(--navy-700);border-radius:18px;padding:22px;overflow:hidden;}
  .widget h4{font-family:var(--display);font-weight:700;font-size:16px;margin:0 0 4px;letter-spacing:-.01em;}
  .widget .wsub{font-size:12.5px;color:var(--muted-dim);margin:0 0 16px;}
  .locked .lockable{filter:blur(7px);opacity:.85;pointer-events:none;user-select:none;}
  .lock-ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;cursor:pointer;background:radial-gradient(circle at center,rgba(8,11,31,.32),rgba(8,11,31,.72));transition:background .15s;}
  .lock-ov:hover{background:radial-gradient(circle at center,rgba(8,11,31,.25),rgba(8,11,31,.66));}
  .lock-ov:focus-visible{outline:none;box-shadow:var(--ring);}
  .lock-ov .lk{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:var(--navy-800);border:1px solid var(--navy-600);color:var(--periwinkle-soft);}
  .lock-ov .lk svg{width:20px;height:20px;}
  .lock-ov .lkt{font-family:var(--display);font-weight:700;font-size:14px;}
  .lock-ov .lks{font-size:12px;color:var(--muted);}
  .kpi.locked .lock-ov{gap:0;}
  .kpi.locked .lock-ov .lk{width:34px;height:34px;}
  .kpi.locked .lock-ov .lkt,.kpi.locked .lock-ov .lks{display:none;}
  .active-list{display:flex;flex-direction:column;gap:10px;}
  .active-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:var(--navy-900);border:1px solid var(--navy-700);}
  .active-item .ai-glyph{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;color:var(--navy-900);background:radial-gradient(circle at 32% 28%,var(--periwinkle-soft),var(--periwinkle));}
  .active-item .ai-glyph svg{width:19px;height:19px;}
  .active-item .aim{flex:1;min-width:0;}
  .active-item .ain{font-weight:600;font-size:14px;}
  .active-item .aiw{font-size:12px;color:var(--muted);margin-top:1px;}
  .active-item .status{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--teal);border:1px solid rgba(45,212,191,.35);border-radius:7px;padding:3px 9px;white-space:nowrap;}
  .recfeed{display:flex;flex-direction:column;gap:10px;}
  .recitem{display:flex;gap:11px;padding:12px;border-radius:12px;background:var(--navy-900);border:1px solid var(--navy-700);}
  .recitem .rd{width:8px;height:8px;border-radius:50%;background:var(--periwinkle);box-shadow:0 0 8px 1px var(--periwinkle);flex:none;margin-top:6px;}
  .recitem .rt{font-size:13.5px;line-height:1.45;}
  .recitem .rt b{font-weight:600;}
  .dash-back{margin-top:8px;}

  /* paywall modal */
  .modal-scrim{position:fixed;inset:0;z-index:50;background:rgba(4,6,18,.74);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:24px;}
  .modal-scrim.show{display:flex;animation:fadein .25s ease both;}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){.modal-scrim.show{animation:none;}}
  .modal{width:100%;max-width:440px;background:linear-gradient(180deg,var(--navy-800),var(--navy-850));border:1px solid var(--navy-600);border-radius:22px;padding:30px;box-shadow:0 30px 80px -20px rgba(0,0,0,.9);position:relative;}
  .modal .mclose{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:9px;border:1px solid var(--navy-700);background:transparent;color:var(--muted);cursor:pointer;font-size:17px;display:grid;place-items:center;}
  .modal .mclose:hover{color:var(--white);border-color:var(--navy-600);}
  .modal .mclose:focus-visible{outline:none;box-shadow:var(--ring);}
  .modal .mlk{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;background:radial-gradient(circle at 32% 28%,var(--periwinkle-soft),var(--periwinkle));color:var(--navy-900);margin-bottom:16px;}
  .modal .mlk svg{width:24px;height:24px;}
  .modal h3{font-family:var(--display);font-weight:800;font-size:24px;letter-spacing:-.02em;margin:0 0 8px;}
  .modal p{font-size:14.5px;color:var(--muted);margin:0 0 18px;line-height:1.55;}
  .modal ul{list-style:none;padding:0;margin:0 0 22px;display:flex;flex-direction:column;gap:11px;}
  .modal li{display:flex;gap:11px;font-size:14px;color:var(--white);align-items:center;}
  .modal li .ck{width:20px;height:20px;border-radius:6px;flex:none;display:grid;place-items:center;background:rgba(45,212,191,.15);color:var(--teal);font-size:12px;font-weight:800;}
  .modal .mcta{display:flex;flex-direction:column;gap:10px;}
  .modal .mnote{font-size:12px;color:var(--muted-dim);text-align:center;margin:14px 0 0;}

  /* ===== hqzen-plan tokens (for the AI summary) ===== */
  :root{
    --panel:#0D1330; --panel-2:#0A0F28; --surface:#141C3D; --surface-2:#18224A;
    --line:rgba(124,138,255,.16); --line-soft:rgba(124,138,255,.10);
    --ink:#F4F6FF; --ink-mut:#AEB6E0; --ink-faint:#727DB0;
    --indigo:#7C8AFF; --indigo-deep:#5B6CF0; --amber:#F6C667;
    --grad:linear-gradient(102deg,#8A95FF 0%,#2DD4BF 100%);
    --r-lg:18px; --r-md:14px;
  }
  /* ===== scoped AI-summary plan (#planv2) ===== */
  .grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  /* persistent funnel shell + side panel (wizard, drafting and plan all live here) */
  .fshell{position:relative;z-index:1;display:grid;grid-template-columns:360px 1fr;min-height:100vh}
  @media (max-width:1040px){ .fshell{grid-template-columns:1fr} }
  .fmain{position:relative;min-width:0;display:flex;flex-direction:column}
  .fmain > #wizard{padding:36px clamp(22px,4vw,52px) 70px;max-width:840px;width:100%;margin:0 auto}
  .fmain > #wizard .pillars{margin-bottom:26px}
  .fside{position:sticky;top:0;align-self:start;height:100vh;overflow:auto;background:radial-gradient(600px 360px at 110% -10%,rgba(45,212,191,.12),transparent 60%),radial-gradient(520px 420px at -10% 8%,rgba(124,138,255,.16),transparent 55%),linear-gradient(180deg,var(--panel),var(--panel-2));border-right:1px solid var(--line);padding:34px;display:flex;flex-direction:column;gap:24px}
  @media (max-width:1040px){ .fside{position:static;height:auto;overflow:visible;border-right:0;border-bottom:1px solid var(--line);padding:28px 22px} }
  .fside .eyebrow{font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin:0}
  .fside .brand{display:flex;align-items:center;gap:10px}
  .fside .brand .mark{width:30px;height:30px;border-radius:9px;background:var(--grad);display:grid;place-items:center;box-shadow:0 0 22px rgba(124,138,255,.5)}
  .fside .brand .mark svg{width:16px;height:16px}
  .fside .brand .word{font-family:var(--display);font-weight:800;font-size:21px;letter-spacing:-.02em}
  .fside .panel-hero .eyebrow{margin-bottom:12px}
  .fside .panel-hero h1{font-family:var(--display);font-weight:800;font-size:clamp(26px,2.6vw,34px);line-height:1.08;letter-spacing:-.01em;margin:0}
  .fside .panel-hero p.lede{color:var(--ink-mut);margin:14px 0 6px;font-size:15.5px;max-width:34ch}
  .fside .panel-hero .deploy-line{color:var(--indigo);font-weight:600;margin:0}
  .fside .hero-free{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:18px;padding:10px 12px;border:1px solid rgba(45,212,191,.30);border-radius:12px;background:linear-gradient(135deg,rgba(45,212,191,.10),rgba(124,138,255,.06));font-size:13px;color:var(--ink-mut);line-height:1.5}
  .fside .hero-free .hf-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px rgba(45,212,191,.6);flex:none}
  .fside .hero-free b{color:var(--white);font-weight:700}
  .fside .trust{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .fside .avstack{display:flex;flex-direction:row;align-items:center}
  .fside .avstack .av{width:38px;height:38px;border-radius:50%;border:2px solid var(--panel);margin-left:-12px;overflow:hidden;background:var(--surface);flex:none;display:block;box-shadow:0 3px 8px rgba(0,0,0,.35);transition:transform .15s}
  .fside .avstack:hover .av{margin-left:-6px}
  .fside .avstack .av:first-child{margin-left:0}
  .fside .avstack:hover .av:first-child{margin-left:0}
  .fside .avstack .av svg{width:100%;height:100%;display:block}
  .fside .avstack .av img{width:100%;height:100%;object-fit:cover;display:block}
  .fside .avstack .more{margin-left:-10px;height:30px;padding:0 11px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-mut);font-size:11.5px;font-weight:700;display:grid;place-items:center;position:relative;z-index:1}
  .fside .trust-txt{display:flex;flex-direction:column;gap:3px;min-width:0}
  .fside .trust-txt .stars{font-size:13px;color:var(--amber);letter-spacing:1.5px;display:flex;align-items:baseline;gap:5px;line-height:1}
  .fside .trust-txt .stars b{color:var(--ink);font-family:var(--display);font-weight:800;letter-spacing:0;font-size:13.5px}
  .fside .trust-txt .stars span{color:var(--ink-faint);font-size:11px;letter-spacing:0}
  .fside .trust span.t{font-size:13px;color:var(--ink-mut)}
  .fside .trust span.t b{color:var(--ink);font-weight:600}
  .fside .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .fside .stat{background:linear-gradient(180deg,rgba(255,255,255,.03),transparent);border:1px solid var(--line-soft);border-radius:var(--r-md);padding:14px 13px}
  .fside .stat .ic{color:var(--teal);width:18px;height:18px;display:block;margin-bottom:8px}
  .fside .stat b{font-family:var(--display);font-weight:800;font-size:20px;display:block;letter-spacing:-.02em}
  .fside .stat small{color:var(--ink-faint);font-size:11.5px;line-height:1.25;display:block;margin-top:2px}
  .fside .closer{border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;background:linear-gradient(180deg,rgba(124,138,255,.10),rgba(124,138,255,.03));display:flex;gap:14px;align-items:flex-start}
  .fside .closer .orb{flex:none;width:38px;height:38px;border-radius:12px;background:var(--grad);display:grid;place-items:center;box-shadow:0 0 26px rgba(45,212,191,.45)}
  .fside .closer .orb svg{width:19px;height:19px}
  .fside .closer .muted{color:var(--ink-faint);font-size:12.5px;font-weight:600}
  .fside .closer .big{font-family:var(--display);font-weight:700;font-size:16px;margin-top:3px;line-height:1.25}
  #planv2 .grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  #planv2 .eyebrow{font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin:0}
  #planv2 .plan{padding:40px clamp(22px,4vw,52px) 56px;max-width:780px;margin:0 auto}
  #planv2 .plan.has-ovp{max-width:1240px}
  @media (max-width:1040px){ #planv2 .plan,#planv2 .plan.has-ovp{padding:30px 22px 44px;max-width:780px} }
  #planv2 .plan-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap}
  #planv2 .plan-head .eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  #planv2 .live-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 0 rgba(45,212,191,.6);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(45,212,191,.55)}70%{box-shadow:0 0 0 8px rgba(45,212,191,0)}100%{box-shadow:0 0 0 0 rgba(45,212,191,0)}}
  #planv2 .plan-head h2{font-family:var(--display);font-weight:700;font-size:clamp(23px,2.6vw,30px);line-height:1.1;letter-spacing:-.01em;margin:0}
  #planv2 .plan-head .sub{color:var(--ink-mut);margin-top:8px;font-size:15px}
  #planv2 .regen{flex:none;display:inline-flex;align-items:center;gap:8px;min-height:44px;padding:0 16px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.02);color:var(--ink);font:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.18s}
  #planv2 .regen:hover{border-color:var(--indigo);background:rgba(124,138,255,.10)}
  #planv2 .regen:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  #planv2 .regen svg{width:15px;height:15px;transition:transform .6s}
  #planv2 .regen.spin svg{transform:rotate(360deg)}
  #planv2 .recap{display:flex;flex-wrap:wrap;gap:8px;margin:22px 0 6px}
  #planv2 .chip{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;background:var(--surface);border:1px solid var(--line-soft);font-size:12.5px;color:var(--ink-mut)}
  #planv2 .chip b{color:var(--ink);font-weight:600}
  #planv2 .chip .k{color:var(--ink-faint);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
  #planv2 .section-h{display:flex;align-items:baseline;gap:12px;margin:38px 0 4px}
  #planv2 .section-h .n{font-family:var(--display);font-weight:700;font-size:13px;color:var(--indigo);letter-spacing:.04em}
  #planv2 .section-h h3{font-family:var(--display);font-weight:700;font-size:19px;margin:0}
  #planv2 .section-note{color:var(--ink-mut);font-size:14px;margin:6px 0 18px}
  #planv2 .op-flow-label{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:700;font-size:15px;margin:24px 0 12px;color:var(--ink)}
  #planv2 .op-flow-label .ofl{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:#08112A;background:var(--grad);flex:none}
  #planv2 .op-flow-label .ofl svg{width:16px;height:16px}
  #planv2 .flow{position:relative;display:flex;flex-direction:column}
  #planv2 .stage{position:relative;display:grid;grid-template-columns:46px 1fr;gap:16px;padding:0 0 22px}
  #planv2 .rail{position:relative;display:flex;flex-direction:column;align-items:center}

  #planv2 .flow-foot{display:flex;align-items:center;gap:10px;margin-top:2px;padding:13px 15px;border:1px dashed var(--line);border-radius:var(--r-md);background:rgba(45,212,191,.05);font-size:13.5px;color:var(--ink-mut)}

  #planv2 .flow-foot svg{width:16px;height:16px;color:var(--teal);flex:none}

  #planv2 .pkg:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}

  #planv2 .pods-head{margin:30px 0 0}

  #planv2 .pod-top{display:flex;align-items:center;gap:8px}
  #planv2 .pod-tag{font-size:9.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--tc);background:color-mix(in srgb,var(--tc) 16%,transparent);border:1px solid color-mix(in srgb,var(--tc) 42%,transparent);padding:3px 8px;border-radius:999px;white-space:nowrap}
  #planv2 .pod-pop{font-size:9px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--amber);white-space:nowrap}

  #planv2 .pod-name{font-family:var(--display);font-weight:700;font-size:15.5px;line-height:1.2}

  #planv2 .pod-add{flex:none;min-height:38px;padding:0 16px;border-radius:10px;border:1px solid var(--tc);background:transparent;color:var(--tc);font-family:var(--display);font-weight:700;font-size:13px;cursor:pointer;transition:.15s}
  #planv2 .pod-add:hover{background:color-mix(in srgb,var(--tc) 14%,transparent)}
  #planv2 .pod-add[aria-pressed="true"]{background:var(--tc);color:#08112A;border-color:var(--tc)}

  #planv2 .bundle-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px;padding:12px 16px;border-radius:12px;background:rgba(124,138,255,.10);border:1px solid var(--line);font-size:13px;color:var(--ink-mut)}
  #planv2 .bundle-bar[hidden]{display:none}

  /* ===== two-view split: pure summary vs. configure ===== */
  #planv2 .plan-view[hidden]{display:none}
  #planv2 .plan-view{animation:planfade .45s ease both}
  @keyframes planfade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){ #planv2 .plan-view{animation:none} }
  #planv2 .opt-inline{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);border:1px solid var(--line);border-radius:6px;padding:2px 7px;vertical-align:middle;margin-left:6px}
  #planv2 .back-to-summary{display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px solid var(--line);border-radius:999px;min-height:40px;padding:0 16px 0 12px;color:var(--ink-mut);font:inherit;font-weight:600;font-size:13.5px;cursor:pointer;transition:.16s;margin-bottom:22px}
  #planv2 .back-to-summary:hover{border-color:var(--indigo);color:var(--ink);background:rgba(124,138,255,.08)}
  #planv2 .back-to-summary:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  #planv2 .back-to-summary svg{width:16px;height:16px}

  /* pods on the summary — a clear, first-class part of the plan (read-only; edit on step 2) */
  #planv2 .pods-recap{margin-top:14px;padding:18px;border-radius:var(--r-lg);border:1px solid var(--line);background:linear-gradient(180deg,rgba(124,138,255,.08),rgba(124,138,255,.02))}
  #planv2 .pods-recap.empty{display:flex;align-items:center;gap:13px;flex-wrap:wrap;border-style:dashed}
  #planv2 .pods-recap .pr-ic{flex:none;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--grad);box-shadow:0 0 22px rgba(124,138,255,.4)}
  #planv2 .pods-recap .pr-ic svg{width:17px;height:17px}
  #planv2 .pr-empty-txt{flex:1;min-width:0;font-size:13.5px;color:var(--ink-mut)}
  #planv2 .pr-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  #planv2 .pr-title{flex:1;min-width:0;font-family:var(--display);font-weight:700;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  #planv2 .pr-title b{font-weight:800}
  #planv2 .pr-aiflag{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#08112A;background:var(--grad);border-radius:999px;padding:3px 9px;box-shadow:0 0 14px rgba(124,138,255,.4)}
  #planv2 .pr-edit{flex:none;display:inline-flex;align-items:center;gap:7px;min-height:38px;padding:0 15px;border-radius:10px;border:1px solid var(--indigo);background:transparent;color:var(--indigo);font:inherit;font-family:var(--display);font-weight:700;font-size:13px;cursor:pointer;transition:.15s}
  #planv2 .pr-edit:hover{background:rgba(124,138,255,.12)}
  #planv2 .pr-edit:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  #planv2 .pr-grid{display:grid;grid-template-columns:1fr;gap:11px}
  @media (min-width:561px){ #planv2 .pr-grid{grid-template-columns:1fr 1fr} }
  #planv2 .pr-pod{position:relative;display:flex;gap:0;background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r-md);padding:0;overflow:hidden}
  #planv2 .pr-pod .pr-bar{flex:none;width:4px;align-self:stretch}
  #planv2 .pr-pod-body{padding:13px 15px;min-width:0}

  #planv2 .pr-pod-tag{font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--tc);background:color-mix(in srgb,var(--tc) 16%,transparent);border:1px solid color-mix(in srgb,var(--tc) 40%,transparent);padding:2px 7px;border-radius:999px}
  #planv2 .pr-pod-desc{font-size:12px;color:var(--ink-mut);line-height:1.45;margin:6px 0 8px}
  #planv2 .pr-pod-team{font-size:11px;font-weight:600;color:var(--ink-faint);display:flex;align-items:center}

  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}

<body>
<div class="ambient" aria-hidden="true"><div class="orb a"></div><div class="orb b"></div><div class="orb c"></div></div>

<div class="fshell" id="funnel">
  <!-- PERSISTENT SIDE PANEL -->
  <aside class="fside" aria-label="About HQZen">
    <div class="brand">
      <span class="mark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 5.6L20 9l-4 4 1 6-5-2.8L7 19l1-6-4-4 5.6-1.4L12 2z" fill="#08112A"/></svg></span>
      <span class="word">HQZen</span>
    </div>
    <div class="panel-hero">
      <div class="eyebrow">Build your</div>
      <h1>AI-Powered <span class="grad-text">Operating</span> Team</h1>
      <p class="lede">AI workflows. Human expertise. Seamless operations.</p>
      <p class="deploy-line">Deployed in days, not months.</p>
      <div class="hero-free"><span class="hf-dot"></span><b>Free with Gmail.</b><span>Upgrade to the full Operating System whenever you're ready.</span></div>
    </div>
    <div class="trust">
      <div class="avstack" id="avStack" aria-hidden="true"></div>
      <div class="trust-txt">
        <div class="stars" aria-hidden="true">★★★★★ <b>4.9</b><span>/5</span></div>
        <span class="t">Trusted by <b>200+ companies</b> worldwide</span>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg><b>200+</b><small>Operations experts</small></div>
      <div class="stat"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg><b>98%</b><small>Client satisfaction</small></div>
      <div class="stat"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><b>24/7</b><small>Global coverage</small></div>
    </div>
    <div class="closer">
      <span class="orb" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8L12 3z" fill="#08112A"/><circle cx="18.5" cy="5.5" r="1.6" fill="#08112A"/></svg></span>
      <div><div class="muted">Not just software.&nbsp;&nbsp;Not just staffing.</div><div class="big">We build and run your AI-powered operations.</div></div>
    </div>
  </aside>

  <!-- RIGHT COLUMN: swaps through the funnel -->
  <main class="fmain">
    <span id="stepFlag" class="sr-only">Build your plan</span>

    <!-- WIZARD -->
    <div id="wizard">
      <p class="eyebrow" style="margin-bottom:14px">Build your AI organisation</p>
      <div class="pillars">
        <span class="pillar"><span class="pd"></span>Process designed</span>
        <span class="pillar"><span class="pd"></span>AI workflows</span>
        <span class="pillar"><span class="pd"></span>Managed by HQZen</span>
        <span class="pillar"><span class="pd"></span>Human oversight</span>
      </div>

    <div class="panel">
      <div class="stepper" id="stepper">
        <button class="stp active" type="button" data-step="details"><span class="num"><span>1</span></span>Details</button>
        <span class="stp-div"></span>
        <button class="stp" type="button" data-step="pain" disabled><span class="num"><span>2</span></span>Challenges</button>
      </div>

      <!-- STEP 1: DETAILS (condensed) -->
      <section class="step show" id="stepDetails">
        <div class="step-head">
          <h2>Tell Us the Essentials</h2>
          <p>Enter your details. The AI uses these to design your workspace and live preview.</p>
        </div>

        <div class="assistant">
          <span class="av"><i class="zeni-sparkle" aria-hidden="true"></i></span>
          <span class="atext"><b>HQZen AI</b> uses your details to recommend the right operations, draft your workflows, and prepare your command centre — before you commit.</span>
        </div>

        <div class="field">
          <label for="company">Company name <span class="req">required</span></label>
          <input id="company" type="text" placeholder="e.g. Acme Corp" autocomplete="organization" />
        </div>

        <div class="grid2">
          <div class="field"><label for="fname">Your name <span class="req">required</span></label><input id="fname" type="text" placeholder="Jane Smith" autocomplete="name" /></div>
          <div class="field">
            <label for="email">Work email <span class="req">required</span></label>
            <input id="email" type="email" placeholder="jane@yourcompany.com" autocomplete="email" />
          </div>
        </div>

        <div class="field">
          <span class="flabel">Current team size</span>
          <div class="sizes" id="sizes" role="group" aria-label="Current team size"></div>
        </div>

        <div class="validate" id="detailsValidate">Company name, your name, and work email are required.</div>
      </section>

      <!-- STEP 2: CHALLENGES (pain points) -->
      <section class="step" id="stepPain">
        <div class="step-head">
          <h2>What’s Slowing You Down?</h2>
          <p>Select the challenges relevant to your organisation. The AI uses these to tailor the module recommendation.</p>
        </div>
        <div class="assistant">
          <span class="av"><i class="zeni-sparkle" aria-hidden="true"></i></span>
          <span class="atext">The more context you share, the more accurate your recommendation. <b>HQZen AI</b> maps each challenge to the right operations and workflows.</span>
        </div>
        <div class="pains" id="pains" role="group" aria-label="Your challenges"></div>
        <p class="tools-note" id="painNote" aria-live="polite">Optional — but picking a few sharpens your recommendation.</p>
      </section>

      <div class="nav">
        <div class="left" id="navLeft">Step 1 of 2 — about you</div>
        <div class="right">
          <button class="btn btn-ghost" id="backBtn" type="button" style="display:none">Go back</button>
          <button class="btn btn-primary" id="nextBtn" type="button">Save and continue</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DRAFTING -->
  <section class="draft-stage" id="drafting" aria-live="polite">
    <div class="org-build-wrap">
      <div class="org-build-av"><i class="zeni-sparkle" aria-hidden="true"></i></div>
      <div class="org-build-brand">HQZen <span class="org-build-ai">AI</span></div>
      <h2 class="org-build-title" id="draftTitle">Designing Your Organisation…</h2>
      <div class="org-build-sub" id="orgBuildSub">Understanding your business</div>
      <div class="org-build-bar"><div class="org-build-fill" id="orgBuildFill"></div></div>
      <div class="org-build-pct" id="orgBuildPct">0%</div>
    </div>
    <div class="org-build-steps" id="orgBuildSteps"></div>
    <p class="draft-sub">Mapping the process, deploying the AI, assigning oversight.</p>
    <div class="steps" id="steps"></div>
  </section>

  <!-- REVIEW · AI-designed summary of operations + tools (user can deselect) -->
  <section class="review-stage" id="reviewStage" aria-live="polite">
    <div class="rv-shell">
      <div class="rv-head">
        <div class="rv-eyebrow"><span class="rv-spark"><i class="zeni-sparkle" aria-hidden="true"></i></span>HQZen AI</div>
        <h2 class="rv-title">Your organisation, designed.</h2>
        <p class="rv-sub">Here&rsquo;s what the AI mapped for <b id="rvCompany">your organisation</b>. Everything is pre&#x2011;checked based on the AI&rsquo;s confidence &mdash; deselect anything you&rsquo;d rather not include, then continue.</p>
      </div>

      <div class="rv-section">
        <div class="rv-section-head">
          <span class="rv-section-h">AI&#x2011;identified operations</span>
          <span class="rv-section-meta" id="rvOpsMeta">5 areas identified</span>
        </div>
        <div class="rv-ops" id="rvOps"></div>
      </div>

      <div class="rv-section">
        <div class="rv-section-head">
          <span class="rv-section-h">Recommended tools to connect</span>
          <span class="rv-section-meta" id="rvToolsMeta">Tap to deselect any</span>
        </div>
        <div class="rv-gmail-banner">
          <span class="rv-gmail-ic">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="#4285F4" d="M22.6 12.2c0-.7-.1-1.4-.2-2H12v3.8h6c-.3 1.4-1 2.5-2.2 3.3v2.8h3.5c2-1.9 3.3-4.7 3.3-7.9z"/><path fill="#34A853" d="M12 23c2.9 0 5.4-1 7.2-2.7l-3.5-2.8c-1 .7-2.2 1.1-3.7 1.1-2.9 0-5.3-1.9-6.2-4.6H2.2v2.9C4 20.5 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.8 14c-.2-.7-.4-1.4-.4-2.2s.1-1.5.4-2.2V6.7H2.2C1.4 8.3 1 10.1 1 12s.4 3.7 1.2 5.3z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3 .6 4.1 1.6l3.1-3.1C17.4 2.2 14.9 1 12 1 7.7 1 4 3.5 2.2 6.7L5.8 9.6C6.7 7 9.1 5.4 12 5.4z"/></svg>
          </span>
          <div class="rv-gmail-tx">
            <div class="rv-gmail-h">Gmail is free <span class="rv-gmail-pill">LIMITED TIME</span></div>
            <div class="rv-gmail-d">Connect Gmail at no cost &mdash; for a limited time only. Other tools are bundled into your HQZen subscription.</div>
          </div>
          <button class="rv-gmail-btn" type="button" id="rvGmailBtn">Connect</button>
        </div>
        <div class="rv-tools" id="rvTools"></div>
      </div>

      <div class="rv-cta">
        <button class="btn btn-primary" id="rvBuildBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          <span>Open my workspace</span>
        </button>
        <span class="rv-note">You can refine anything inside your workspace.</span>
      </div>
    </div>
  </section>

  <!-- OUTPUT -->
  <section class="out-stage" id="output">
    <div id="planv2">
        <main class="plan">
        <!-- ============ VIEW A · PURE SUMMARY ============ -->
        <div class="plan-view" id="planSummary">
          <div class="bp-layout">
          <!-- AI Operations Blueprint — unified summary: context + workflows + specialists + impact -->
          <div class="blueprint reveal" id="blueprint">
            <div class="bp-top">
              <div class="eyebrow"><span class="live-dot" aria-hidden="true"></span> Your generated operation</div>
              <button class="regen" id="regen" type="button" aria-label="Regenerate this plan">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7M21 3v5h-5"/></svg>
                Regenerate
              </button>
            </div>
            <div class="bp-head">
              <h3>Here's your <span class="grad-text">AI Operations Blueprint</span> <svg class="bp-spark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l1.7 5L19 8.7 14 10.4 12 16l-1.9-5.6L5 8.7 10.3 7z"/><path d="M19 13.5l.9 2.6 2.6.9-2.6.9-.9 2.6-.9-2.6-2.6-.9 2.6-.9z" opacity=".7"/></svg></h3>
              <p>We combine AI, workflows, and human expertise to run <b id="bpCompany">your operations</b>.</p>
            </div>
            <div class="bp-context" id="bpContext"></div>
            <div class="bp-grid">
              <div class="bp-col">
                <div class="bp-col-h"><span class="bp-ic ai" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.7 5L19 8.7 14 10.4 12 16l-1.9-5.6L5 8.7 10.3 7z"/></svg></span>AI Workflows <span class="bp-n" id="bpWfN"></span></div>
                <ul class="bp-list" id="bpWorkflows"></ul>
              </div>
              <div class="bp-col">
                <div class="bp-col-h"><span class="bp-ic hum" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20a6.5 6.5 0 0 1 13 0"/><path d="M16 5.2a3 3 0 0 1 0 5.6M16.5 20a6.5 6.5 0 0 0-2.3-4.9"/></svg></span>Success Experts <span class="bp-n" id="bpSpecN"></span></div>

              </div>
              <div class="bp-col">
                <div class="bp-col-h"><span class="bp-ic imp" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg></span>Projected Impact</div>
                <div class="bp-impact" id="bpImpact"></div>
                <div class="bp-guarantee">
                  <span class="bp-shield" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 3v5c0 5-3.4 8.4-8 10-4.6-1.6-8-5-8-10V6z"/><path d="M9 12l2 2 4-4"/></svg></span>

  var OP_CONFIDENCE={exec:91,customer:88,revenue:85,finance:90,talent:98};

    state.pains.forEach(function(k){
      var ops=(PAINBYKEY[k]&&PAINBYKEY[k].ops)||[];

    });

  }

  function toggleOp(opk,card,head){

      state.selected[opk]=new Set(); card.classList.add('sel'); head.setAttribute('aria-pressed','true');

      card.querySelectorAll('.wf').forEach(function(wb){
        if(picked<3 && wb.dataset.wf.indexOf('custom')!==0){ wb.setAttribute('aria-pressed','true'); state.selected[opk].add(wb.dataset.wf); picked++; }

  var STEP_ORDER=["details","pain"];
  function gotoStep(target){
    if(target==="pain" && !detailsValid()) return false;
    if(target==="ops" && !detailsValid()) return false;
    if(target==="tools" && (!detailsValid()||!opsValid())) return false;
    step=target;
    document.querySelectorAll('.step').forEach(function(s){s.classList.remove('show');});
    document.getElementById('step'+cap(target)).classList.add('show');
    if(target==="pain") renderPains();
    // stepper visuals
    var idx=STEP_ORDER.indexOf(target);
    document.querySelectorAll('.stp').forEach(function(b){
      var bi=STEP_ORDER.indexOf(b.dataset.step);
      b.classList.toggle('active', bi===idx);
      b.classList.toggle('done', bi<idx);
      b.disabled = bi>idx ? !(bi===idx) && !canReach(b.dataset.step) : false;
    });
    // nav
    document.getElementById('backBtn').style.display = idx===0 ? 'none':'inline-flex';
    var next=document.getElementById('nextBtn');
    var nextLabels={details:'Next: Challenges →', pain:'Design my organisation →'};
    next.textContent = nextLabels[target] || 'Continue →';
    var labels=["Step 1 of 2 — about you","Step 2 of 2 — your challenges"];
    document.getElementById('navLeft').textContent=labels[idx];
    document.getElementById('stepFlag').textContent='Step '+(idx+1)+' of 2';
    window.scrollTo({top:0,behavior:reduce?'auto':'smooth'});
    return true;
  }
  function canReach(s){ if(s==="details")return true; if(s==="pain")return detailsValid(); return false; }

    b.addEventListener('click',function(){ if(canReach(b.dataset.step)) gotoStep(b.dataset.step); });

    var idx=STEP_ORDER.indexOf(step); if(idx>0) gotoStep(STEP_ORDER[idx-1]);

  var TOOL_PER_OP={
    exec:["Gmail","Outlook","Google Calendar","Notion"],
    customer:["Slack","Intercom","HubSpot","Zendesk"],
    revenue:["HubSpot","LinkedIn","Apollo","Pipedrive"],

  var REVIEW_SELECTED={ops:new Set(), tools:new Set(), gmail:false};
  function aiSuggestedOps(){
    /* AI always recommends Talent. The other top-scoring ops by confidence are
       included if their score is high enough OR if a matching pain was flagged. */
    var suggested=["talent"];
    var painOps=new Set();
    state.pains.forEach(function(k){
      var ops=(PAINBYKEY[k]&&PAINBYKEY[k].ops)||[];
      ops.forEach(function(o){painOps.add(o);});
    });
    ["exec","customer","revenue","finance"].forEach(function(opk){
      var score=confScore(opk);
      if(score>=92 || painOps.has(opk)) suggested.push(opk);
    });
    /* Always recommend at least 3 ops so the review feels generous */
    if(suggested.length<3){
      var byScore=["exec","customer","revenue","finance"].sort(function(a,b){return confScore(b)-confScore(a);});
      byScore.forEach(function(opk){ if(suggested.indexOf(opk)<0 && suggested.length<3) suggested.push(opk); });
    }
    return suggested;
  }
  function aiSuggestedTools(){
    var tools=new Set();
    REVIEW_SELECTED.ops.forEach(function(opk){

    });

  function buildSequenceV2(){
    var stages=Array.prototype.slice.call(document.querySelectorAll('#planv2 .stage'));
    if(!stages.length) return;
    if(reduce){ stages.forEach(function(s){s.classList.add('in');}); return; }
    var regen=document.getElementById('regen'); regen.classList.add('spin'); regen.disabled=true;
    stages.forEach(function(st){ st.classList.remove('in'); var e=st.querySelector('.build-flag'); if(e)e.remove(); });
    var i=0;
    (function step(){
      if(i>=stages.length){ regen.classList.remove('spin'); regen.disabled=false; return; }
      var st=stages[i]; st.classList.add('in','building');
      var flag=document.createElement('div'); flag.className='build-flag'; flag.innerHTML='<span class="sp"></span>'+(st.dataset.build||'Configuring…');
      st.querySelector('.card').appendChild(flag);
      setTimeout(function(){ st.classList.remove('building'); if(flag) flag.remove(); i++; step(); }, 440);
    })();
  }
